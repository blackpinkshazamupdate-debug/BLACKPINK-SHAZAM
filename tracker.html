<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; transform-origin:center center; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px; flex-shrink:0;}
.song img{width:50px; border-radius:6px; flex-shrink:0;}
.info{flex:1; position:relative; min-width:120px;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
  overflow-y:auto;
}

.card{
  background:black;
  padding:15px;
  border-radius:12px;
  text-align:center;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  font-size:18px;
  overflow:hidden;
}

.exportArea img{
  width:100%;
  height:auto;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.exportArea h2{font-size:26px; color:#ff2ea6;}
.exportArea p{font-size:18px;}

.share-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin-top:10px;
}

.share-buttons button{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:20px 25px;
  border-radius:14px;
  font-size:18px;
  z-index:9999;
  width:min(500px,95%);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,46,166,.5);
}

.milestone-popup h2{
  margin:0 0 10px 0;
  color:#ff2ea6;
  font-size:20px;
}

.milestone-popup ul{
  padding-left:18px;
  margin:0;
  text-align:left;
}

.milestone-popup button{
  margin-top:12px;
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
}

@media (max-width:768px){
  header{font-size:28px;padding:20px;}
  .section-content{padding:20px;}
  .song{gap:10px;padding:8px;}
  .rank{width:30px;font-size:16px;}
  .song img{width:40px;}
  .section h2{font-size:22px;}
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000 }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }
function progress(v){ let prev=lastMilestone(v); let next=nextMilestone(v); return Math.floor(((v-prev)/(next-prev))*100) }
function milestoneText(v){ if(v>=1000000) return (v/1000000).toFixed(1)+"M"; return (v/1000)+"k" }

/* CONFETTI */
function launchConfetti(){
  const images=[
    {src:"images/lightstick1.png"},
    {src:"images/lightstick2.png"},
    {src:"images/bplogo.png", glow:true}
  ]

  for(let i=0;i<40;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"

    let chosen=images[Math.floor(Math.random()*images.length)]
    c.style.backgroundImage=`url(${chosen.src})`
    if(chosen.glow){
      c.style.filter="drop-shadow(0 0 12px #ff2ea6)"
    }

    let x=Math.random()*window.innerWidth
    let y=-60
    let speedY=Math.random()*2+2
    let drift=Math.random()*2-1
    let rotate=0

    c.style.left=x+"px"
    c.style.top=y+"px"

    document.body.appendChild(c)
    confettiActive.push(c)

    function frame(){
      if(!document.body.contains(c)) return
      y+=speedY
      x+=drift
      rotate+=3
      c.style.top=y+"px"
      c.style.left=x+"px"
      c.style.transform="rotate("+rotate+"deg)"
      if(y<window.innerHeight+80){
        requestAnimationFrame(frame)
      }
    }
    requestAnimationFrame(frame)
  }
}

function stopConfetti(){
  confettiActive.forEach(c=>c.remove())
  confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
  if(list.length===0) return
  launchConfetti()
  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML="<h2>Milestone Achievements</h2><ul>"+list.map(s=>`<li>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))} Shazams</li>`).join("")+"</ul><button onclick='this.parentNode.remove();stopConfetti()'>Close</button>"
  document.body.appendChild(pop)
  setTimeout(()=>{ if(pop.parentNode){ pop.remove(); stopConfetti() } },20000)
}

/* === ORIGINAL CODE WITH FIXED SHARE BUTTONS === */

async function generatePromoCanvas(area){
  return await html2canvas(area,{backgroundColor:"#000",scale:2})
}

function openPromo(title,subtitle,shazams,img,list=null){
  let contentHTML=""
  if(list){
    contentHTML+="<div style='text-align:left;margin-top:10px;'>"
    list.forEach((s,i)=>{ contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>` })
    contentHTML+="</div>"
  }
  let overlay=document.createElement("div")
  overlay.className="overlay"
  overlay.innerHTML=`
  <div class="card">
    <div id="exportArea" class="exportArea">
      <img src="${img}">
      <h2>${title}</h2>
      <p>${exact(shazams)} Shazams</p>
      ${contentHTML}
    </div>
    <div class="share-buttons">
      <button onclick="shareOnFacebook()">Facebook</button>
      <button onclick="shareOnTwitter()">Twitter</button>
      <button onclick="shareOnWhatsApp()">WhatsApp</button>
      <button onclick="shareOnTelegram()">Telegram</button>
      <button onclick="copyPageLink()">Copy Link</button>
      <button onclick="this.closest('.overlay').remove()">Close</button>
    </div>
  </div>`
  document.body.appendChild(overlay)

  async function getPromoImage(){
    let area=document.getElementById("exportArea")
    let canvas=await generatePromoCanvas(area)
    return canvas.toDataURL()
  }

  window.shareOnFacebook=async()=>{ let img=await getPromoImage(); window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}&picture=${encodeURIComponent(img)}`,"_blank") }
  window.shareOnTwitter=async()=>{ let img=await getPromoImage(); window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(title)}&hashtags=BLACKPINK`,"_blank") }
  window.shareOnWhatsApp=async()=>{ let img=await getPromoImage(); window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title+" "+location.href)}`,"_blank") }
  window.shareOnTelegram=async()=>{ let img=await getPromoImage(); window.open(`https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(title)}`,"_blank") }
  window.copyPageLink=()=>{ navigator.clipboard.writeText(location.href) }
}

/* SONG + SECTION BUILD LOGIC REMAINS UNCHANGED */
function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
    <div class="bar"><span style="width:${progress(s.Shazams)}%"></span></div>
    <div class="hoverstats">+${exact(s.Shazams-s.Previous)} • ${progress(s.Shazams)}% to ${milestoneText(nextMilestone(s.Shazams))}</div>
  </div>
  <button class="pink" onclick="openPromo('${s.Song}','',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
  return div
}

function createSection(name,list){
  let div=document.createElement("div")
  div.className="section"
  let total=list.reduce((a,b)=>a+b.Shazams,0)
  let safeList=encodeURIComponent(JSON.stringify(list))
  let promoImage=(name==="DEADLINE")?"images/deadline.jpg":sectionImage(name)
  div.innerHTML=`<div class="section-bg" style="background-image:url('${sectionImage(name)}')"></div>
  <div class="section-content">
    <h2>${name}
    <button class="pink" onclick="openSectionPromo('${name}',${total},'${promoImage}','${safeList}')">Share</button>
    </h2>
  </div>`
  let content=div.querySelector(".section-content")
  list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
  return div
}

function openSectionPromo(name,total,img,encoded){
  let list=JSON.parse(decodeURIComponent(encoded))
  openPromo(name,"",total,img,list)
}

function sectionImage(name){
  const map={
    "GLOBAL TOP 10":"images/ot4.jpg",
    "DEADLINE":"images/deadline2.png",
    "BORN PINK":"images/bornpink.jpg",
    "THE ALBUM":"images/thealbum.jpg",
    "KILL THIS LOVE - EP":"images/killthislove.jpg",
    "SQUARE UP":"images/squareup.jpg",
    "SQUARE TWO":"images/squaretwo.jpg",
    "SQUARE ONE":"images/squareone.jpg",
    "Others":"images/asifitsyourlast.jpg"
  }
  return map[name]||"images/ot4.jpg"
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""
  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
  let topDiv=createSection("GLOBAL TOP 10",top)
  c.appendChild(topDiv)
  let sections=[...new Set(songs.map(s=>s.Section))]
  sections.forEach(sec=>{
    if(sec!=="GLOBAL TOP 10")
      c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
  })
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
  songs=res.data

  let reached=[]
  songs.forEach(s=>{
    if(s.Previous && lastMilestone(s.Shazams)>lastMilestone(s.Previous)){
      reached.push(s)
    }
  })

  build()
  document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]

  if(reached.length>0){
    setTimeout(()=>showMilestonePopup(reached),800)
  }
}})
</script>

</body>
</html>
