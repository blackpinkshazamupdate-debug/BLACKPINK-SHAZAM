<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{color:#ff2ea6;font-size:28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.song{display:flex;align-items:center;gap:15px;padding:10px;margin:8px 0;background:rgba(0,0,0,.55);border-radius:10px;transition:.25s;position:relative;flex-wrap:wrap;}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;}
.song img{width:50px;border-radius:6px;}
.info{flex:1;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.share-icon{
  cursor:pointer;
  font-size:18px;
  color:#ff2ea6;
  margin-left:auto;
  transition:.2s;
}
.share-icon:hover{transform:scale(1.2);}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:20px;
}

.card{
  background:black;padding:20px;border-radius:12px;
  width:min(520px,95%);position:relative;
}

.close-x{
  position:absolute;top:10px;right:15px;
  font-size:22px;color:#ff2ea6;cursor:pointer;
}

.exportArea{
  padding:15px;background:black;border-radius:12px;text-align:center;
}

.exportArea img{
  width:100%;
  max-height:240px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.socials{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
  flex-wrap:wrap;
}

.socials img{
  width:28px;
  cursor:pointer;
  transition:.2s;
}
.socials img:hover{transform:scale(1.2);}

.copy-btn{
  background:#ff2ea6;border:none;color:white;
  padding:6px 10px;border-radius:6px;cursor:pointer;
}

.milestone-popup{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:20px;border-radius:14px;
  z-index:9999;border:1px solid #ff2ea6;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;height:60px;
  background-size:contain;
  background-repeat:no-repeat;
}
</style>
</head>

<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) }
function lastMilestone(v){ return milestones.filter(m=>v>=m).pop()||0 }

function progress(v){
 let prev=lastMilestone(v)
 let next=nextMilestone(v)
 if(!next)return 100
 return Math.floor(((v-prev)/(next-prev))*100)
}

function milestoneText(v){
 if(v>=1000000) return (v/1000000).toFixed(1)+"M"
 return (v/1000)+"k"
}

/* CONFETTI WITH MOVEMENT */
function launchConfetti(){
 const images=["images/lightstick1.png","images/lightstick2.png","images/bplogo.png"]
 for(let i=0;i<35;i++){
  let c=document.createElement("div")
  c.className="confetti-piece"
  let img=images[Math.floor(Math.random()*images.length)]
  c.style.backgroundImage=`url(${img})`
  if(img.includes("bplogo")){
    c.style.filter="drop-shadow(0 0 6px #ff2ea6)"
  }
  c.style.left=Math.random()*window.innerWidth+"px"
  c.style.top="-60px"
  document.body.appendChild(c)
  animateConfetti(c)
  confettiActive.push(c)
 }
}

function animateConfetti(el){
 let angle=0
 let speed=2+Math.random()*2
 let drift=(Math.random()*2-1)*2
 function frame(){
  angle+=0.05
  let top=parseFloat(el.style.top)+speed
  let left=parseFloat(el.style.left)+Math.sin(angle)*drift
  el.style.top=top+"px"
  el.style.left=left+"px"
  el.style.transform=`rotate(${angle*180/Math.PI}deg)`
  if(top<window.innerHeight+80) requestAnimationFrame(frame)
 }
 requestAnimationFrame(frame)
}

function stopConfetti(){
 confettiActive.forEach(c=>c.remove())
 confettiActive=[]
}

/* MILESTONE CHECK */
function checkMilestones(){
 let reached=[]
 songs.forEach(s=>{
  let last=lastMilestone(s.Shazams)
  if(last && !s._milestoneShown){
    s._milestoneShown=true
    reached.push(s)
  }
 })
 if(reached.length){
  showMilestonePopup(reached)
 }
}

function showMilestonePopup(list){
 launchConfetti()
 let pop=document.createElement("div")
 pop.className="milestone-popup"
 pop.innerHTML="<b>Milestones reached!</b><br><br>"+
 list.map(s=>`${s.Song} → ${milestoneText(lastMilestone(s.Shazams))}`).join("<br>")+
 "<br><br><button class='copy-btn' onclick='this.parentNode.remove();stopConfetti()'>Close</button>"
 document.body.appendChild(pop)
}

/* PROMO SHARE SYSTEM */
async function exportImage(){
 let area=document.getElementById("exportArea")
 let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
 return new Promise(resolve=>canvas.toBlob(resolve))
}

async function shareTo(platform){
 let blob=await exportImage()
 let file=new File([blob],"blackpink.png",{type:"image/png"})
 let url=location.href

 if(navigator.canShare && navigator.canShare({files:[file]})){
  await navigator.share({files:[file],text:"BLACKPINK Shazam Tracker",url:url})
 }else{
  let shareURL=""
  if(platform==="twitter") shareURL=`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`
  if(platform==="facebook") shareURL=`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`
  if(platform==="telegram") shareURL=`https://t.me/share/url?url=${encodeURIComponent(url)}`
  if(platform==="whatsapp") shareURL=`https://wa.me/?text=${encodeURIComponent(url)}`
  window.open(shareURL,"_blank")
 }
}

async function downloadPromo(){
 let blob=await exportImage()
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="blackpink.png"
 a.click()
}

function copyLink(){
 navigator.clipboard.writeText(location.href)
 alert("Link copied!")
}

function openPromo(title,subtitle,shazams,img,list=null){
 let contentHTML=""
 if(list){
  contentHTML+="<div style='text-align:left;margin-top:10px;'>"
  list.forEach((s,i)=>{contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>`})
  contentHTML+="</div>"
 }

 let overlay=document.createElement("div")
 overlay.className="overlay"
 overlay.innerHTML=`
 <div class="card">
  <div class="close-x" onclick="this.closest('.overlay').remove()">✕</div>
  <div id="exportArea" class="exportArea">
   <img src="${img}">
   <h2 style="color:#ff2ea6">${title}</h2>
   <p>${exact(shazams)} Shazams</p>
   ${contentHTML}
  </div>

  <div class="socials">
   <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" onclick="shareTo('twitter')">
   <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" onclick="shareTo('facebook')">
   <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" onclick="shareTo('telegram')">
   <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" onclick="shareTo('whatsapp')">
   <img src="https://cdn-icons-png.flaticon.com/512/60/60710.png" onclick="downloadPromo()">
   <button class="copy-btn" onclick="copyLink()">Copy Link</button>
  </div>
 </div>`
 document.body.appendChild(overlay)
}

/* ORIGINAL BUILD LOGIC PRESERVED */
function createSong(s,rank){
 let div=document.createElement("div")
 div.className="song"
 div.innerHTML=`
 <div class="rank">${rank}</div>
 <img src="images/${s.ImageFile}">
 <div class="info">
  ${s.Song}
  <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
  <div class="bar"><span style="width:${progress(s.Shazams)}%"></span></div>
  <div class="hoverstats">+${exact(s.Shazams-s.Previous)} • ${progress(s.Shazams)}%</div>
 </div>
 <div class="share-icon" onclick="openPromo('${s.Song}','',${s.Shazams},'images/${s.ImageFile}')">🔗</div>`
 return div
}

function createSection(name,list){
 let div=document.createElement("div")
 div.className="section"
 let total=list.reduce((a,b)=>a+b.Shazams,0)
 let safeList=encodeURIComponent(JSON.stringify(list))
 let promoImage=sectionImage(name)

 div.innerHTML=`
 <div class="section-bg" style="background-image:url('${promoImage}')"></div>
 <div class="section-content">
  <h2>${name}
  <span class="share-icon" onclick="openSectionPromo('${name}',${total},'${promoImage}','${safeList}')">🔗</span>
  </h2>
 </div>`

 let content=div.querySelector(".section-content")
 list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
 return div
}

function openSectionPromo(name,total,img,encoded){
 let list=JSON.parse(decodeURIComponent(encoded))
 openPromo(name,"",total,img,list)
}

function sectionImage(name){
 const map={
  "GLOBAL TOP 10":"images/ot4.jpg",
  "DEADLINE":"images/deadline2.png",
  "BORN PINK":"images/bornpink.jpg",
  "THE ALBUM":"images/thealbum.jpg",
  "KILL THIS LOVE - EP":"images/killthislove.jpg",
  "SQUARE UP":"images/squareup.jpg",
  "SQUARE TWO":"images/squaretwo.jpg",
  "SQUARE ONE":"images/squareone.jpg",
  "Others":"images/asifitsyourlast.jpg"
 }
 return map[name]||"images/ot4.jpg"
}

function build(){
 let c=document.getElementById("content")
 c.innerHTML=""
 let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
 c.appendChild(createSection("GLOBAL TOP 10",top))
 let sections=[...new Set(songs.map(s=>s.Section))]
 sections.forEach(sec=>{
  if(sec!=="GLOBAL TOP 10")
   c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
 })
 checkMilestones()
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
 complete:function(res){
  songs=res.data
  build()
  document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
 }})
</script>

</body>
</html>
