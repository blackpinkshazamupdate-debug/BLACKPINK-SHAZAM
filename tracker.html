<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
/* --- YOUR CSS UNCHANGED --- */
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{color:#ff2ea6;font-size:28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.song{display:flex;align-items:center;gap:15px;padding:10px;margin:8px 0;background:rgba(0,0,0,.55);border-radius:10px;transition:.25s;transform-origin:center center;position:relative;flex-wrap:wrap;}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;flex-shrink:0;}
.song img{width:50px;border-radius:6px;flex-shrink:0;}
.info{flex:1;position:relative;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}

.card{background:black;padding:15px;border-radius:12px;text-align:center;width:min(520px,95%);max-height:90vh;display:flex;flex-direction:column;}

.exportArea{padding:15px;background:black;border-radius:12px;font-size:18px;overflow:hidden;}

.exportArea img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-bottom:10px;}

.exportArea h2{font-size:26px;color:#ff2ea6;}
.exportArea p{font-size:18px;}

button.pink{background:#ff2ea6;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;margin-top:5px;}

.milestone-popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.9);
padding:20px 25px;
border-radius:14px;
font-size:18px;
z-index:9999;
width:min(500px,95%);
border:1px solid #ff2ea6;
}

.milestone-popup h2{margin:0 0 10px 0;color:#ff2ea6;font-size:20px;}

.confetti-piece{
position:fixed;
pointer-events:none;
z-index:10000;
width:60px;
height:60px;
background-size:contain;
background-repeat:no-repeat;
}

@media (max-width:768px){
header{font-size:28px;padding:20px;}
.section-content{padding:20px;}
.song{gap:10px;padding:8px;}
.rank{width:30px;font-size:16px;}
.song img{width:40px;}
.section h2{font-size:22px;}
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>

let songs=[]
let milestonesReached=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }

/* 🎉 CONFETTI WITH MOVEMENT */
function launchConfetti(){

const images=[
{src:"images/lightstick1.png"},
{src:"images/lightstick2.png"},
{src:"images/bplogo.png", glow:true}
]

for(let i=0;i<45;i++){

let c=document.createElement("div")
c.className="confetti-piece"

let img=images[Math.floor(Math.random()*images.length)]

c.style.backgroundImage=`url(${img.src})`
c.style.left=Math.random()*window.innerWidth+"px"
c.style.top="-80px"

if(img.glow){
c.style.filter="drop-shadow(0 0 12px #ff2ea6)"
}

document.body.appendChild(c)

let fallSpeed=Math.random()*3+2
let drift=Math.random()*2-1
let rotate=0

function animate(){
rotate+=3
c.style.top=(parseFloat(c.style.top)+fallSpeed)+"px"
c.style.left=(parseFloat(c.style.left)+drift)+"px"
c.style.transform=`rotate(${rotate}deg)`

if(parseFloat(c.style.top)<window.innerHeight+100){
requestAnimationFrame(animate)
}else{
c.remove()
}
}

requestAnimationFrame(animate)
}
}

/* 🎉 POPUP */
function showMilestonePopup(list){

if(list.length===0) return

launchConfetti()

let pop=document.createElement("div")
pop.className="milestone-popup"

pop.innerHTML="<h2>Milestone Achievements</h2><ul>"+
list.map(s=>`<li>${s.Song} reached ${exact(lastMilestone(s.Shazams))} Shazams</li>`).join("")
+"</ul><button onclick='this.parentNode.remove()'>Close</button>"

document.body.appendChild(pop)

setTimeout(()=>{ if(pop.parentNode) pop.remove() },15000)
}

/* --- YOUR ORIGINAL FUNCTIONS BELOW UNCHANGED --- */

function createSong(s,rank){
let div=document.createElement("div")
div.className="song"
div.innerHTML=`
<div class="rank">${rank}</div>
<img src="images/${s.ImageFile}">
<div class="info">
${s.Song}
<div class="total-shazams">${exact(s.Shazams)} Shazams</div>
<div class="bar"><span style="width:50%"></span></div>
</div>`
return div
}

function build(){

let c=document.getElementById("content")
c.innerHTML=""

let reached=[]

songs.forEach(s=>{
let milestone=lastMilestone(s.Shazams)
let key=s.Song+"-"+milestone
if(milestone && !milestonesReached.includes(key)){
milestonesReached.push(key)
reached.push(s)
}
})

if(reached.length>0){
setTimeout(()=>showMilestonePopup(reached),1000)
}

/* ORIGINAL BUILD */
let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
top.forEach((s,i)=>c.appendChild(createSong(s,i+1)))

}

Papa.parse("blackpink.csv",{
download:true,
header:true,
dynamicTyping:true,
complete:function(res){
songs=res.data.filter(x=>x.Song)
build()
document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}
})

</script>
</body>
</html>
