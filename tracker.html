<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 20px;
  background:rgba(0,0,0,.6);
  border-radius:10px;
  transition:.25s;
}
.song:hover{transform:scale(1.02);box-shadow:0 0 15px #ff2ea6;}

.rank{width:40px;font-size:18px;}
.song img{width:50px;border-radius:6px;}

.info{flex:1;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total{font-size:12px;opacity:.7;margin-top:3px;}

button{
  background:#ff2ea6;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* MILESTONE POPUP */
.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.95);
  padding:20px 25px;
  border-radius:14px;
  z-index:9999;
  width:min(500px,95%);
  border:1px solid rgba(255,46,166,.5);
}

.milestone-popup h2{
  margin:0 0 10px 0;
  color:#ff2ea6;
}

/* CONFETTI */
.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:55px;
  height:55px;
  background-size:contain;
  background-repeat:no-repeat;
  opacity:1;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){ return Number(n||0).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){
  milestones.push(i)
}

function lastMilestone(v){
  let last=0
  milestones.forEach(m=>{
    if(v>=m) last=m
  })
  return last
}

function nextMilestone(v){
  return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000
}

function progress(v){
  let prev=lastMilestone(v)
  let next=nextMilestone(v)
  return Math.floor(((v-prev)/(next-prev))*100)
}

function milestoneText(v){
  if(v>=1000000) return (v/1000000).toFixed(1)+"M"
  return (v/1000)+"k"
}

/* ===== CONFETTI (FIXED) ===== */
function launchConfetti(){

  const images=[
    "images/lightstick1.png",
    "images/lightstick2.png",
    "images/bplogo.png"
  ]

  for(let i=0;i<40;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"

    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.top="-60px"
    c.style.backgroundImage=`url("${images[Math.floor(Math.random()*images.length)]}")`

    document.body.appendChild(c)
    confettiActive.push(c)

    let speed=Math.random()*3+2
    function fall(){
      if(!document.body.contains(c)) return
      c.style.top=(parseFloat(c.style.top)+speed)+"px"
      if(parseFloat(c.style.top)<window.innerHeight+60){
        requestAnimationFrame(fall)
      }
    }
    requestAnimationFrame(fall)
  }
}

function stopConfetti(){
  confettiActive.forEach(c=>{
    c.remove()
  })
  confettiActive=[]
}

/* ===== MILESTONE CHECK ===== */
function checkMilestones(){
  let reached=[]
  songs.forEach(s=>{
    if(s.Previous===null || s.Previous===undefined) return

    let oldMilestone=lastMilestone(s.Previous)
    let newMilestone=lastMilestone(s.Shazams)

    if(newMilestone>oldMilestone){
      reached.push(s)
    }
  })

  if(reached.length>0){
    showMilestonePopup(reached)
  }
}

/* ===== POPUP ===== */
function showMilestonePopup(list){
  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"

  pop.innerHTML=
  "<h2>Milestone Achievements</h2><ul>"+
  list.map(s=>
    `<li>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))} Shazams</li>`
  ).join("")+
  "</ul><br><button onclick='closeMilestone(this)'>Close</button>"

  document.body.appendChild(pop)
}

function closeMilestone(btn){
  btn.parentNode.remove()
  stopConfetti()
}

/* ===== BUILD UI ===== */
function createSong(s,rank){

  let increase = (s.Previous!=null) ? exact(s.Shazams - s.Previous) : "0"

  let div=document.createElement("div")
  div.className="song"

  div.innerHTML=`
    <div class="rank">${rank}</div>
    <img src="images/${s.ImageFile}">
    <div class="info">
      ${s.Song}
      <div class="total">${exact(s.Shazams)} Shazams</div>
      <div class="bar"><span style="width:${progress(s.Shazams)}%"></span></div>
      <div style="font-size:12px;opacity:.7;">+${increase} • ${progress(s.Shazams)}% to ${milestoneText(nextMilestone(s.Shazams))}</div>
    </div>
  `

  return div
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""

  let sorted=[...songs].sort((a,b)=>b.Shazams-a.Shazams)

  sorted.forEach((s,i)=>{
    c.appendChild(createSong(s,i+1))
  })
}

/* ===== LOAD CSV ===== */
Papa.parse("blackpink.csv",{
  download:true,
  header:true,
  dynamicTyping:true,
  complete:function(res){

    songs=res.data.filter(x=>x.Song)

    build()
    checkMilestones()

    document.getElementById("updated").innerText=
      "Last Updated: "+songs[0]["Last Update"]
  }
})
</script>

</body>
</html>
