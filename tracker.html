<script>
let songs=[]
let milestonesReached=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000 }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }
function progress(v){ let prev=lastMilestone(v); let next=nextMilestone(v); return Math.floor(((v-prev)/(next-prev))*100) }
function milestoneText(v){ if(v>=1000000) return (v/1000000).toFixed(1)+"M"; return (v/1000)+"k" }

////////////////////////////////////////////////////////
//////////////////// CONFETTI //////////////////////////
////////////////////////////////////////////////////////

function launchConfetti(){
  const images=[
    {src:"images/lightstick1.png", glow:false},
    {src:"images/lightstick2.png", glow:false},
    {src:"images/bplogo.png", glow:true}
  ]

  for(let i=0;i<45;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"

    let choice=images[Math.floor(Math.random()*images.length)]
    c.style.backgroundImage=`url(${choice.src})`

    if(choice.glow){
      c.style.filter="drop-shadow(0 0 8px #ff2ea6)"
    }

    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.top="-80px"

    document.body.appendChild(c)
    confettiActive.push(c)
    animateConfetti(c)
  }
}

function animateConfetti(el){
  let posY=-80
  let posX=parseFloat(el.style.left)
  let speedY=2+Math.random()*3
  let sway=Math.random()*2+1
  let rotation=Math.random()*360
  let rotateSpeed=(Math.random()-.5)*6

  function frame(){
    posY+=speedY
    posX+=Math.sin(posY/30)*sway
    rotation+=rotateSpeed

    el.style.top=posY+"px"
    el.style.left=posX+"px"
    el.style.transform=`rotate(${rotation}deg)`

    if(posY<window.innerHeight+100){
      requestAnimationFrame(frame)
    }
  }
  requestAnimationFrame(frame)
}

function stopConfetti(){
  confettiActive.forEach(c=>{
    c.style.transition="opacity 1.5s"
    c.style.opacity=0
    setTimeout(()=>c.remove(),1500)
  })
  confettiActive=[]
}

////////////////////////////////////////////////////////
//////////////// MILESTONE POPUP ///////////////////////
////////////////////////////////////////////////////////

function checkMilestones(){
  let reached=[]

  songs.forEach(song=>{
    let current=lastMilestone(song.Shazams)
    let previous=lastMilestone(song.Previous || 0)

    if(current>previous && !milestonesReached.includes(song.Song+current)){
      milestonesReached.push(song.Song+current)
      reached.push(song)
    }
  })

  if(reached.length>0){
    showMilestonePopup(reached)
  }
}

function showMilestonePopup(list){
  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML="<h2>Milestone Achievements</h2><ul>"+
  list.map(s=>`<li>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))} Shazams</li>`).join("")
  +"</ul><button>Close</button>"

  pop.querySelector("button").onclick=()=>{
    pop.remove()
    stopConfetti()
  }

  document.body.appendChild(pop)

  setTimeout(()=>{
    if(pop.parentNode){
      pop.remove()
      stopConfetti()
    }
  },20000)
}

////////////////////////////////////////////////////////
//////////////// ORIGINAL BUILD LOGIC //////////////////
////////////////////////////////////////////////////////

function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
    <div class="bar"><span style="width:${progress(s.Shazams)}%"></span></div>
    <div class="hoverstats">+${exact(s.Shazams-s.Previous)} • ${progress(s.Shazams)}% to ${milestoneText(nextMilestone(s.Shazams))}</div>
  </div>
  <button class="pink" onclick="openPromo('${s.Song}','',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
  return div
}

function createSection(name,list){
  let div=document.createElement("div")
  div.className="section"
  let total=list.reduce((a,b)=>a+b.Shazams,0)
  let safeList=encodeURIComponent(JSON.stringify(list))
  let promoImage=sectionImage(name)

  div.innerHTML=`
  <div class="section-bg" style="background-image:url('${sectionImage(name)}')"></div>
  <div class="section-content">
    <h2>${name}
    <button class="pink" onclick="openSectionPromo('${name}',${total},'${promoImage}','${safeList}')">Share</button>
    </h2>
  </div>`

  let content=div.querySelector(".section-content")
  list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
  return div
}

function openSectionPromo(name,total,img,encoded){
  let list=JSON.parse(decodeURIComponent(encoded))
  openPromo(name,"",total,img,list)
}

function sectionImage(name){
  const map={
    "GLOBAL TOP 10":"images/ot4.jpg",
    "DEADLINE":"images/deadline2.png",
    "BORN PINK":"images/bornpink.jpg",
    "THE ALBUM":"images/thealbum.jpg",
    "KILL THIS LOVE - EP":"images/killthislove.jpg",
    "SQUARE UP":"images/squareup.jpg",
    "SQUARE TWO":"images/squaretwo.jpg",
    "SQUARE ONE":"images/squareone.jpg",
    "Others":"images/asifitsyourlast.jpg"
  }
  return map[name]||"images/ot4.jpg"
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""

  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
  c.appendChild(createSection("GLOBAL TOP 10",top))

  let sections=[...new Set(songs.map(s=>s.Section))]
  sections.forEach(sec=>{
    if(sec!=="GLOBAL TOP 10")
      c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
  })

  checkMilestones()   // ✅ TRIGGER AFTER BUILD
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
  songs=res.data
  build()
  document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>
