<script>
let songs=[]
let confettiActive=[]

function exact(n){ return Number(n||0).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000 }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }
function progress(v){ let prev=lastMilestone(v); let next=nextMilestone(v); return Math.floor(((v-prev)/(next-prev))*100) }
function milestoneText(v){ if(v>=1000000) return (v/1000000).toFixed(1)+"M"; return (v/1000)+"k" }

/* ================= CONFETTI ================= */

function launchConfetti(){

  const images=[
    "images/lightstick1.png",
    "images/lightstick2.png",
    "images/bplogo.png"
  ]

  for(let i=0;i<45;i++){

    let c=document.createElement("div")
    c.className="confetti-piece"

    let chosen=images[Math.floor(Math.random()*images.length)]
    c.style.backgroundImage=`url("${chosen}")`

    // Glow for BP logo
    if(chosen.includes("bplogo")){
      c.style.filter="drop-shadow(0 0 8px #ff2ea6) drop-shadow(0 0 18px #ff2ea6)"
    }

    let x=Math.random()*window.innerWidth
    let y=-60
    let drift=(Math.random()-0.5)*2
    let speed=Math.random()*3+2
    let rotate=Math.random()*360
    let rotateSpeed=(Math.random()-0.5)*5

    c.style.left=x+"px"
    c.style.top=y+"px"

    document.body.appendChild(c)
    confettiActive.push(c)

    function animate(){
      if(!document.body.contains(c)) return

      y+=speed
      x+=drift
      rotate+=rotateSpeed

      c.style.top=y+"px"
      c.style.left=x+"px"
      c.style.transform=`rotate(${rotate}deg)`

      if(y<window.innerHeight+80){
        requestAnimationFrame(animate)
      } else {
        c.remove()
      }
    }

    requestAnimationFrame(animate)
  }
}

function stopConfetti(){
  confettiActive.forEach(c=>c.remove())
  confettiActive=[]
}

/* ================= MILESTONE ================= */

function checkMilestones(){
  let reached=[]
  songs.forEach(s=>{
    if(s.Previous==null) return
    let oldM=lastMilestone(s.Previous)
    let newM=lastMilestone(s.Shazams)
    if(newM>oldM){
      reached.push(s)
    }
  })
  if(reached.length>0){
    showMilestonePopup(reached)
  }
}

function showMilestonePopup(list){
  if(list.length===0) return

  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML=
    "<h2>Milestone Achievements</h2><ul>"+
    list.map(s=>
      `<li>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))} Shazams</li>`
    ).join("")+
    "</ul><button onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

  document.body.appendChild(pop)

  setTimeout(()=>{
    if(pop.parentNode){
      pop.remove()
      stopConfetti()
    }
  },20000)
}

/* ================= BUILD ================= */

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""

  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
  c.appendChild(createSection("GLOBAL TOP 10",top))

  let sections=[...new Set(songs.map(s=>s.Section))]
  sections.forEach(sec=>{
    if(sec!=="GLOBAL TOP 10")
      c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
  })
}

/* ================= CSV LOAD ================= */

Papa.parse("blackpink.csv",{
  download:true,
  header:true,
  dynamicTyping:true,
  complete:function(res){
    songs=res.data.filter(x=>x.Song)
    build()
    checkMilestones()   // ← THIS was missing before
    document.getElementById("updated").innerText=
      "Last Updated: "+songs[0]["Last Update"]
  }
})
</script>
