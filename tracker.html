<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(12px) brightness(.35);
  transform:scale(1.2);
}
.section-content{position:relative;padding:30px;}
.section h2{
  color:#ff2ea6;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 0;
  background:rgba(0,0,0,.55);
  border-radius:10px;
  transition:.25s;
  transform-origin:center center;
  position:relative;
  flex-wrap:wrap;
}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;flex-shrink:0;}
.song img{width:50px;border-radius:6px;flex-shrink:0;}
.info{flex:1;position:relative;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:0.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:20px;
  border-radius:16px;
  text-align:center;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:20px;
  background:black;
  border-radius:16px;
  font-size:18px;
  text-align:center;
}

.exportArea img{
  width:auto;
  max-width:100%;
  height:auto;
  max-height:260px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
}

.exportArea h2{font-size:26px;color:#ff2ea6;}
.exportArea p{font-size:18px;}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  padding:20px 25px;
  border-radius:14px;
  font-size:18px;
  z-index:9999;
  width:min(500px,95%);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,46,166,.5);
}

.milestone-popup h2{
  margin:0 0 10px 0;
  color:#ff2ea6;
  font-size:20px;
}

.milestone-popup ul{
  padding-left:18px;
  margin:0;
  text-align:left;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
  opacity:1;
  transition:opacity 2s;
}

</style>
</head>

<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>

let songs=[]
let confettiActive=[]
let milestoneTriggered=false

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000 }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }
function milestoneText(v){ return v>=1000000 ? (v/1000000).toFixed(1)+"M" : (v/1000)+"k" }

/* CONFETTI */
function launchConfetti(){
  const images=["images/lightstick1.png","images/lightstick2.png","images/bplogo.png"]
  for(let i=0;i<40;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"
    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.top="-60px"
    c.style.backgroundImage=`url(${images[Math.floor(Math.random()*images.length)]})`
    document.body.appendChild(c)
    confettiActive.push(c)
    animateConfetti(c)
  }
}

function animateConfetti(c){
  let fall=Math.random()*3+2
  function frame(){
    if(!document.body.contains(c)) return
    c.style.top=(parseFloat(c.style.top)+fall)+"px"
    if(parseFloat(c.style.top)<window.innerHeight+60) requestAnimationFrame(frame)
  }
  requestAnimationFrame(frame)
}

function stopConfetti(){
  confettiActive.forEach(c=>{
    c.style.opacity=0
    setTimeout(()=>c.remove(),2000)
  })
  confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
  if(list.length===0) return
  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML="<h2>Milestone Achievements</h2><ul>"+
  list.map(s=>`<li>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))} Shazams</li>`).join("")
  +"</ul><button onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

  document.body.appendChild(pop)
  setTimeout(()=>{ if(pop.parentNode){ pop.remove(); stopConfetti() } },20000)
}

/* SHARE */
async function sharePromo(){
  let area=document.getElementById("exportArea")
  let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
  canvas.toBlob(async blob=>{
    let file=new File([blob],"blackpink.png",{type:"image/png"})
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],text:"BLACKPINK Shazam Tracker"})
    }else{
      let a=document.createElement("a")
      a.href=URL.createObjectURL(blob)
      a.download="blackpink-share.png"
      a.click()
    }
  })
}

async function downloadPromo(){
  let area=document.getElementById("exportArea")
  let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
  let a=document.createElement("a")
  a.href=canvas.toDataURL()
  a.download="blackpink-promo.png"
  a.click()
}

function openPromo(title,subtitle,shazams,img){
  let overlay=document.createElement("div")
  overlay.className="overlay"
  overlay.innerHTML=`
  <div class="card">
    <div id="exportArea" class="exportArea">
      <img src="${img}">
      <h2>${title}</h2>
      <p>${exact(shazams)} Shazams</p>
    </div>
    <div>
      <button class="pink" onclick="sharePromo()">Share</button>
      <button class="pink" onclick="downloadPromo()">Download</button>
      <button class="pink" onclick="this.closest('.overlay').remove()">Close</button>
    </div>
  </div>`
  document.body.appendChild(overlay)
}

/* BUILD */
function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
  </div>
  <button class="pink" onclick="openPromo('${s.Song}','',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
  return div
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""

  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
  let section=document.createElement("div")
  section.className="section"
  section.innerHTML=`<div class="section-content"><h2>GLOBAL TOP 10</h2></div>`
  let content=section.querySelector(".section-content")
  top.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
  c.appendChild(section)

  if(!milestoneTriggered){
    let reached=songs.filter(s=>milestones.includes(lastMilestone(s.Shazams)))
    if(reached.length>0){
      milestoneTriggered=true
      showMilestonePopup(reached)
    }
  }
}

document.addEventListener("DOMContentLoaded",function(){
  Papa.parse("blackpink.csv",{
    download:true,
    header:true,
    dynamicTyping:true,
    complete:function(res){
      songs=res.data.filter(s=>s.Song)
      build()
      if(songs.length>0){
        document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
      }
    }
  })
})

</script>

</body>
</html>
