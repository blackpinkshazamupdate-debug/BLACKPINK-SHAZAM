<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{color:#ff2ea6;font-size:28px;display:flex;align-items:center;gap:10px;}

.song{display:flex;align-items:center;gap:15px;padding:10px;margin:8px 0;background:rgba(0,0,0,.55);border-radius:10px;transition:.25s;position:relative;flex-wrap:wrap;}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;}
.song img{width:50px;border-radius:6px;}
.info{flex:1;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:0.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:.5;}

.share-icon{
  cursor:pointer;
  width:22px;
  height:22px;
  fill:#ff2ea6;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:15px;
  border-radius:12px;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
  position:relative;
}

.close-x{
  position:absolute;
  top:10px;
  right:12px;
  font-size:22px;
  cursor:pointer;
  color:#ff2ea6;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  overflow:hidden;
  text-align:center;
}

.exportArea img{
  width:100%;
  height:auto;
  max-height:260px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
}

.socials{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:15px;
}

.socials img{
  width:28px;
  cursor:pointer;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:14px;
  z-index:9999;
  border:1px solid rgba(255,46,166,.5);
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){return Number(n).toLocaleString()}

/* CONFETTI WITH MOVEMENT + LOGO GLOW */
function launchConfetti(){
 const images=[
   {src:"images/lightstick1.png"},
   {src:"images/lightstick2.png"},
   {src:"images/bplogo.png",glow:true}
 ]

 for(let i=0;i<40;i++){
   let c=document.createElement("div")
   c.className="confetti-piece"
   let chosen=images[Math.floor(Math.random()*images.length)]
   c.style.backgroundImage=`url(${chosen.src})`
   if(chosen.glow){
     c.style.filter="drop-shadow(0 0 10px #ff2ea6)"
   }

   let x=Math.random()*window.innerWidth
   let y=-60
   let speed=Math.random()*3+2
   let drift=Math.random()*2-1
   let rotate=0

   c.style.left=x+"px"
   c.style.top=y+"px"

   document.body.appendChild(c)
   confettiActive.push(c)

   function frame(){
     y+=speed
     x+=drift
     rotate+=2
     c.style.top=y+"px"
     c.style.left=x+"px"
     c.style.transform="rotate("+rotate+"deg)"
     if(y<window.innerHeight+80){
       requestAnimationFrame(frame)
     }
   }
   requestAnimationFrame(frame)
 }
}

function stopConfetti(){
 confettiActive.forEach(c=>c.remove())
 confettiActive=[]
}

/* PROMO */
function openPromo(title,total,img,list=null){
 let overlay=document.createElement("div")
 overlay.className="overlay"

 let contentHTML=""
 if(list){
   contentHTML+="<div style='text-align:left;margin-top:10px;'>"
   list.forEach((s,i)=>{contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>`})
   contentHTML+="</div>"
 }

 overlay.innerHTML=`
 <div class="card">
   <div class="close-x" onclick="this.closest('.overlay').remove()">✕</div>
   <div id="exportArea" class="exportArea">
     <img src="${img}">
     <h2 style="color:#ff2ea6">${title}</h2>
     <p>${exact(total)} Shazams</p>
     ${contentHTML}
   </div>
   <div class="socials">
     <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"
      onclick="shareSocial('x')">
     <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"
      onclick="shareSocial('instagram')">
     <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"
      onclick="shareSocial('facebook')">
     <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png"
      onclick="copyLink()">
     <img src="https://cdn-icons-png.flaticon.com/512/724/724933.png"
      onclick="downloadPromo()">
   </div>
 </div>`
 document.body.appendChild(overlay)
}

async function downloadPromo(){
 let canvas=await html2canvas(document.getElementById("exportArea"),{backgroundColor:"#000",scale:2})
 let a=document.createElement("a")
 a.href=canvas.toDataURL()
 a.download="blackpink-promo.png"
 a.click()
}

function shareSocial(type){
 let text=encodeURIComponent("BLACKPINK Shazam Tracker "+location.href)
 if(type==="x") window.open("https://twitter.com/intent/tweet?text="+text,"_blank")
 if(type==="facebook") window.open("https://www.facebook.com/sharer/sharer.php?u="+location.href,"_blank")
 if(type==="instagram") window.open("https://www.instagram.com/","_blank")
}

function copyLink(){
 navigator.clipboard.writeText(location.href)
 alert("Link copied!")
}

/* SHARE ICON SVG */
function shareSVG(){
 return `<svg class="share-icon" viewBox="0 0 24 24">
 <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a2.5 2.5 0 0 0 0-1.39l7-4.11A2.99 2.99 0 1 0 15 5a2.9 2.9 0 0 0 .04.49l-7 4.11a3 3 0 1 0 0 4.8l7.05 4.14c-.03.16-.05.33-.05.5a3 3 0 1 0 3-3z"/>
 </svg>`
}

/* BUILD */
function createSong(s,rank){
 let div=document.createElement("div")
 div.className="song"
 div.innerHTML=`
 <div class="rank">${rank}</div>
 <img src="images/${s.ImageFile}">
 <div class="info">
 ${s.Song}
 <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
 </div>
 ${shareSVG()}`
 div.querySelector(".share-icon").onclick=
 ()=>openPromo(s.Song,s.Shazams,"images/"+s.ImageFile)
 return div
}

function createSection(name,list){
 let div=document.createElement("div")
 div.className="section"
 let total=list.reduce((a,b)=>a+b.Shazams,0)

 div.innerHTML=`
 <div class="section-bg" style="background-image:url('${sectionImage(name)}')"></div>
 <div class="section-content">
 <h2>${name} ${shareSVG()}</h2>
 </div>`

 div.querySelector(".share-icon").onclick=
 ()=>openPromo(name,total,sectionImage(name),list)

 let content=div.querySelector(".section-content")
 list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
 return div
}

function sectionImage(name){
 const map={
 "GLOBAL TOP 10":"images/ot4.jpg"
 }
 return map[name]||"images/ot4.jpg"
}

function build(){
 let c=document.getElementById("content")
 c.innerHTML=""
 let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
 c.appendChild(createSection("GLOBAL TOP 10",top))
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
 songs=res.data
 build()
 document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>

</body>
</html>
