<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; transform-origin:center center; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px; flex-shrink:0;}
.song img{width:50px; border-radius:6px; flex-shrink:0;}
.info{flex:1; position:relative; min-width:120px;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.share-icon{
  background:none;
  border:none;
  cursor:pointer;
  padding:4px;
}
.share-icon svg{
  width:18px;
  height:18px;
  fill:#ff2ea6;
}

/* PROMO OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:20px;
  border-radius:14px;
  width:min(520px,95%);
  position:relative;
}

.close-x{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
  color:#ff2ea6;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  text-align:center;
}

.exportArea img{
  width:100%;
  height:auto;
  border-radius:10px;
  margin-bottom:10px;
}

.social-row{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:15px;
}

.social-row img{
  width:26px;
  cursor:pointer;
  filter:invert(27%) sepia(96%) saturate(5482%) hue-rotate(308deg) brightness(100%) contrast(102%);
}

</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let milestonesReached=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

/* CONFETTI + MILESTONES (UNCHANGED LOGIC) */
const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) || Math.ceil(v/1000000)*1000000 }
function lastMilestone(v){ let last=0; milestones.forEach(m=>{ if(v>=m) last=m }); return last }

function launchConfetti(){
  const images=["images/lightstick1.png","images/lightstick2.png","images/bplogo.png"]
  for(let i=0;i<40;i++){
    let c=document.createElement("div")
    c.style.position="fixed"
    c.style.width="50px"
    c.style.height="50px"
    c.style.backgroundImage=`url(${images[Math.floor(Math.random()*images.length)]})`
    c.style.backgroundSize="contain"
    c.style.backgroundRepeat="no-repeat"
    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.top="-60px"
    c.style.zIndex="9999"
    document.body.appendChild(c)
    let fall=Math.random()*3+2
    function frame(){
      c.style.top=(parseFloat(c.style.top)+fall)+"px"
      if(parseFloat(c.style.top)<window.innerHeight+60) requestAnimationFrame(frame)
      else c.remove()
    }
    requestAnimationFrame(frame)
  }
}

/* PROMO SHARE SYSTEM */

async function generateImage(){
  let area=document.getElementById("exportArea")
  return await html2canvas(area,{backgroundColor:"#000",scale:2})
}

async function shareToSocial(platform){
  let canvas=await generateImage()
  let dataURL=canvas.toDataURL("image/png")
  let link=encodeURIComponent(location.href)
  let text=encodeURIComponent("BLACKPINK Shazam Tracker")

  if(platform==="download"){
    let a=document.createElement("a")
    a.href=dataURL
    a.download="blackpink-promo.png"
    a.click()
    return
  }

  if(platform==="copy"){
    navigator.clipboard.writeText(location.href)
    alert("Link copied!")
    return
  }

  window.open(
    platform==="twitter" ? `https://twitter.com/intent/tweet?url=${link}&text=${text}` :
    platform==="facebook" ? `https://www.facebook.com/sharer/sharer.php?u=${link}` :
    platform==="instagram" ? location.href :
    "_blank"
  )
}

function openPromo(title,subtitle,shazams,img,list=null){
  let contentHTML=""
  if(list){
    contentHTML+="<div style='text-align:left;margin-top:10px;'>"
    list.forEach((s,i)=>{ contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>` })
    contentHTML+="</div>"
  }

  let overlay=document.createElement("div")
  overlay.className="overlay"
  overlay.innerHTML=`
  <div class="card">
    <div class="close-x" onclick="this.closest('.overlay').remove()">✕</div>
    <div id="exportArea" class="exportArea">
      <img src="${img}">
      <h2 style="color:#ff2ea6;">${title}</h2>
      <p>${exact(shazams)} Shazams</p>
      ${contentHTML}
    </div>
    <div class="social-row">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" onclick="shareToSocial('instagram')">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" onclick="shareToSocial('twitter')">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" onclick="shareToSocial('facebook')">
      <img src="https://cdn-icons-png.flaticon.com/512/724/724933.png" onclick="shareToSocial('download')">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828925.png" onclick="shareToSocial('copy')">
    </div>
  </div>`
  document.body.appendChild(overlay)
}

/* REPLACE SHARE BUTTONS WITH ICON */
function shareIconHTML(action){
  return `
  <button class="share-icon" onclick="${action}">
    <svg viewBox="0 0 24 24">
      <path d="M18 8a3 3 0 10-2.83-4H15a3 3 0 000 6 2.99 2.99 0 002.83-2zM6 14a3 3 0 102.83 4H9a3 3 0 000-6 2.99 2.99 0 00-2.83 2zM18 14a3 3 0 00-2.83 2H15a3 3 0 000 6 3 3 0 002.83-4z"/>
    </svg>
  </button>`
}

/* SONG + SECTION LOGIC UNCHANGED */

function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
    <div class="bar"><span style="width:50%"></span></div>
  </div>
  ${shareIconHTML(`openPromo('${s.Song}','',${s.Shazams},'images/${s.ImageFile}')`)}
  `
  return div
}

/* REST OF YOUR BUILD FUNCTION REMAINS EXACTLY SAME */

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
  songs=res.data
  build()
  document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>

</body>
</html>
