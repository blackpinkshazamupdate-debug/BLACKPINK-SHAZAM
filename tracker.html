<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{
  margin:0;
  background:black;
  color:white;
  font-family:"BPFont",sans-serif;
}

header{
  text-align:center;
  padding:clamp(15px,4vw,30px);
  font-size:clamp(24px,5vw,38px);
  color:#ff2ea6;
}

.updated{
  text-align:center;
  opacity:.7;
  margin-bottom:20px;
  font-size:clamp(12px,3vw,16px);
}

.section{
  margin:40px auto;
  max-width:1200px;
  padding:0 15px;
}

.section-content{
  padding:20px;
}

.section h2{
  color:#ff2ea6;
  font-size:clamp(20px,4vw,28px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:12px;
  margin:10px 0;
  background:rgba(0,0,0,.6);
  border-radius:12px;
  transition:.25s;
  flex-wrap:wrap;
}

.song:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px #ff2ea6;
}

.rank{
  font-size:clamp(14px,3vw,20px);
  width:35px;
}

.song img{
  width:clamp(40px,10vw,60px);
  border-radius:8px;
}

.info{
  flex:1;
  min-width:120px;
}

.total-shazams{
  font-size:clamp(12px,3vw,15px);
  opacity:.7;
  margin-top:4px;
}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:clamp(12px,3vw,14px);
}

button.pink:hover{
  opacity:.85;
}

/* SHARE OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:15px;
}

.card{
  background:black;
  padding:20px;
  border-radius:16px;
  text-align:center;
  width:min(500px,95%);
}

.exportArea{
  padding:20px;
  background:black;
  border-radius:12px;
}

.exportArea img{
  width:100%;
  max-height:250px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:15px;
}

.exportArea h2{
  color:#ff2ea6;
  font-size:clamp(20px,4vw,28px);
}

.exportArea p{
  font-size:clamp(18px,4vw,22px);
}

/* MILESTONE POPUP */
.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.95);
  padding:18px 22px;
  border-radius:14px;
  z-index:9999;
  border:1px solid rgba(255,46,166,.5);
  width:min(400px,90%);
  text-align:center;
}

.milestone-popup h2{
  margin:0 0 10px;
  color:#ff2ea6;
  font-size:18px;
}

.confetti-piece{
  position:fixed;
  width:clamp(30px,6vw,60px);
  height:clamp(30px,6vw,60px);
  background-size:contain;
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:10000;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){return Number(n).toLocaleString()}

/* CONFETTI */
function launchConfetti(){
const imgs=[
{src:"images/lightstick1.png"},
{src:"images/lightstick2.png"},
{src:"images/bplogo.png",glow:true}
]

for(let i=0;i<40;i++){
let el=document.createElement("div")
el.className="confetti-piece"

let chosen=imgs[Math.floor(Math.random()*imgs.length)]
el.style.backgroundImage=`url(${chosen.src})`
if(chosen.glow){el.style.filter="drop-shadow(0 0 12px #ff2ea6)"}

el.style.left=Math.random()*window.innerWidth+"px"
el.style.top="-80px"

document.body.appendChild(el)
confettiActive.push(el)
animateConfetti(el)
}
}

function animateConfetti(el){
let x=parseFloat(el.style.left)
let y=-80
let speedY=Math.random()*3+2
let drift=Math.random()*2-1
let rotate=0

function frame(){
y+=speedY
x+=drift
rotate+=2
el.style.top=y+"px"
el.style.left=x+"px"
el.style.transform="rotate("+rotate+"deg)"
if(y<window.innerHeight+100){
requestAnimationFrame(frame)
}
}
requestAnimationFrame(frame)
}

function stopConfetti(){
confettiActive.forEach(c=>c.remove())
confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
if(!list.length) return
launchConfetti()

let pop=document.createElement("div")
pop.className="milestone-popup"
pop.innerHTML="<h2>Milestone Achieved!</h2>"+
list.map(s=>`<div>${s.Song} hit ${exact(s.Shazams)}</div>`).join("")+
"<button class='pink' onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

document.body.appendChild(pop)
setTimeout(()=>{if(pop.parentNode){pop.remove();stopConfetti()}},15000)
}

/* SHARE */
async function generateShare(title,total,img){
let overlay=document.createElement("div")
overlay.className="overlay"
overlay.innerHTML=`
<div class="card">
<div id="exportArea" class="exportArea">
<img src="${img}">
<h2>${title}</h2>
<p>${exact(total)} Shazams</p>
</div>
<div style="margin-top:15px">
<button class="pink" onclick="shareImage()">Share</button>
<button class="pink" onclick="downloadImage()">Download</button>
<button class="pink" onclick="this.closest('.overlay').remove()">Close</button>
</div>
</div>`
document.body.appendChild(overlay)
}

async function shareImage(){
let area=document.getElementById("exportArea")
let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
canvas.toBlob(async blob=>{
let file=new File([blob],"blackpink.png",{type:"image/png"})
if(navigator.share){
await navigator.share({
files:[file],
title:"BLACKPINK Shazam Tracker",
text:"Streaming BLACKPINK 🔥",
url:location.href
})
}
})
}

async function downloadImage(){
let area=document.getElementById("exportArea")
let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="blackpink-promo.png"
a.click()
}

/* BUILD */
function createSong(s,rank){
let div=document.createElement("div")
div.className="song"
div.innerHTML=`
<div class="rank">${rank}</div>
<img src="images/${s.ImageFile}">
<div class="info">
${s.Song}
<div class="total-shazams">${exact(s.Shazams)} Shazams</div>
</div>
<button class="pink" onclick="generateShare('${s.Song}',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
return div
}

function createSection(name,list){
let div=document.createElement("div")
div.className="section"
let total=list.reduce((a,b)=>a+b.Shazams,0)

div.innerHTML=`
<div class="section-content">
<h2>${name}
<button class="pink" onclick="generateShare('${name}',${total},'images/ot4.jpg')">Share</button>
</h2>
</div>`

let content=div.querySelector(".section-content")
list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
return div
}

function build(){
let c=document.getElementById("content")
c.innerHTML=""
let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
c.appendChild(createSection("GLOBAL TOP 10",top))

let sections=[...new Set(songs.map(s=>s.Section))]
sections.forEach(sec=>{
if(sec!=="GLOBAL TOP 10"){
c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
}
})

showMilestonePopup(top.slice(0,1))
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
songs=res.data
build()
document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>

</body>
  </html>
