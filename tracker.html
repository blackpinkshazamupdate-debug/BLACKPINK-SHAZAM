<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; transform-origin:center center; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px; flex-shrink:0;}
.song img{width:50px; border-radius:6px; flex-shrink:0;}
.info{flex:1; position:relative; min-width:120px;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:15px;
  border-radius:12px;
  text-align:center;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  font-size:18px;
  overflow:hidden;
}

.exportArea img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.exportArea h2{font-size:26px; color:#ff2ea6;}
.exportArea p{font-size:18px;}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

@media (max-width:768px){
  header{font-size:28px;padding:20px;}
  .section-content{padding:20px;}
  .song{gap:10px;padding:8px;}
  .rank{width:30px;font-size:16px;}
  .song img{width:40px;}
  .section h2{font-size:22px;}
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]

function exact(n){ return Number(n).toLocaleString() }

/* ---------- FIXED SHARE SYSTEM ---------- */

async function sharePromo(){
  let area=document.getElementById("exportArea")
  let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})

  canvas.toBlob(async blob=>{
    let file=new File([blob],"blackpink-promo.png",{type:"image/png"})

    // If browser supports file sharing (mobile modern browsers)
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({
          files:[file],
          title:"BLACKPINK Shazam Tracker",
          text:"Check out BLACKPINK Shazam stats!",
          url:location.href
        })
      }catch(err){
        console.log("Share cancelled")
      }
    }else{
      // Desktop fallback → auto download
      let a=document.createElement("a")
      a.href=canvas.toDataURL("image/png")
      a.download="blackpink-promo.png"
      a.click()
      alert("Image downloaded. Upload it to your social media post.")
    }
  })
}

async function downloadPromo(){
  let area=document.getElementById("exportArea")
  let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
  let a=document.createElement("a")
  a.href=canvas.toDataURL()
  a.download="blackpink-promo.png"
  a.click()
}

/* ---------- PROMO ---------- */

function openPromo(title,shazams,img,list=null){
  let contentHTML=""
  if(list){
    contentHTML+="<div style='text-align:left;margin-top:10px;'>"
    list.forEach((s,i)=>{ contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>` })
    contentHTML+="</div>"
  }

  let overlay=document.createElement("div")
  overlay.className="overlay"
  overlay.innerHTML=`
  <div class="card">
    <div id="exportArea" class="exportArea">
      <img src="${img}">
      <h2>${title}</h2>
      <p>${exact(shazams)} Shazams</p>
      ${contentHTML}
    </div>
    <div>
      <button class="pink" onclick="sharePromo()">Share</button>
      <button class="pink" onclick="downloadPromo()">Download</button>
      <button class="pink" onclick="this.closest('.overlay').remove()">Close</button>
    </div>
  </div>`
  document.body.appendChild(overlay)
}

/* ---------- SONG + SECTION ---------- */

function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
  </div>
  <button class="pink" onclick="openPromo('${s.Song}',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
  return div
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""
  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
  let total=top.reduce((a,b)=>a+b.Shazams,0)

  let section=document.createElement("div")
  section.className="section"
  section.innerHTML=`
    <div class="section-content">
      <h2>GLOBAL TOP 10
        <button class="pink" onclick='openPromo("GLOBAL TOP 10",${total},"images/ot4.jpg",${JSON.stringify(top).replace(/"/g,'&quot;')})'>Share</button>
      </h2>
    </div>`
  let content=section.querySelector(".section-content")
  top.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
  c.appendChild(section)
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
  songs=res.data
  build()
  document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>

</body>
</html>
