<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{
  color:#ff2ea6;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
}

.share-icon{
  width:20px;
  height:20px;
  cursor:pointer;
  fill:#ff2ea6;
  transition:.2s;
}
.share-icon:hover{transform:scale(1.2);}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 0;
  background:rgba(0,0,0,.55);
  border-radius:10px;
  transition:.25s;
  position:relative;
}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;}
.song img{width:50px;border-radius:6px;}

.info{flex:1;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  border-radius:12px;
  width:min(440px,92%);
  padding:20px;
  position:relative;
}

.close-x{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  color:#ff2ea6;
  cursor:pointer;
}

.exportArea{
  text-align:center;
}

.exportArea img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
  max-height:220px;
}

.socials{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:15px;
  flex-wrap:wrap;
}

.socials img{
  width:30px;
  cursor:pointer;
  transition:.2s;
}
.socials img:hover{transform:scale(1.2);}

.download-btn{
  background:#ff2ea6;
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:10px 15px;
  border-radius:14px;
  z-index:9999;
  border:1px solid #ff2ea6;
  text-align:center;
  max-width:90%;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
}

.milestone-popup b{
  font-size:16px;
  margin:0;
}

.milestone-item{
  display:flex;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  border:1px solid rgba(255,46,166,0.3);
  border-radius:6px;
  font-size:14px;
}

.milestone-close-x{
  position:absolute;
  top:5px;
  right:8px;
  font-size:18px;
  color:#ff2ea6;
  cursor:pointer;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:1;
}
</style>
</head>

<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]
let previousMilestones={}

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function nextMilestone(v){ return milestones.find(m=>m>v) }
function lastMilestone(v){ return milestones.filter(m=>v>=m).pop()||0 }

function progress(v){
 let prev=lastMilestone(v)
 let next=nextMilestone(v)
 if(!next)return 100
 return Math.floor(((v-prev)/(next-prev))*100)
}

function milestoneText(v){
 if(v>=1000000) return (v/1000000).toFixed(1)+"M"
 return (v/1000)+"k"
}

function launchConfetti(){
 const images=["images/lightstick1.png","images/lightstick2.png","images/bplogo.png"]
 for(let i=0;i<40;i++){
  let c=document.createElement("div")
  c.className="confetti-piece"
  let img=images[Math.floor(Math.random()*images.length)]
  c.style.backgroundImage=`url('${img}')`
  if(img.includes("bplogo")) c.style.filter="drop-shadow(0 0 25px #ff2ea6) drop-shadow(0 0 15px #ff2ea6)"
  c.style.left=Math.random()*window.innerWidth+"px"
  c.style.top="-60px"
  c.style.opacity="1"
  document.body.appendChild(c)
  animateConfetti(c)
  confettiActive.push(c)
 }
}

function animateConfetti(el){
 let speed=1.5+Math.random()*2
 let rotation=Math.random()*360
 let rotationSpeed=Math.random()*8-4
 let startTime=Date.now()
 
 function frame(){
  let elapsed=Date.now()-startTime
  let top=parseFloat(el.style.top)+speed
  rotation+=rotationSpeed
  el.style.top=top+"px"
  el.style.transform=`rotate(${rotation}deg)`
  el.style.opacity=Math.max(0,1-(elapsed/15000))
  if(top<window.innerHeight+80 && elapsed<20000){
   requestAnimationFrame(frame)
  } else {
   el.remove()
  }
 }
 requestAnimationFrame(frame)
}

function showMilestonePopup(list){
 if(!list.length) return
 launchConfetti()
 let pop=document.createElement("div")
 pop.className="milestone-popup"
 pop.innerHTML="<span class='milestone-close-x' onclick='this.parentNode.remove()'>✕</span><b>🎉 Milestones reached!</b> "+list.map(s=>`<div class='milestone-item'><span style='color:#ff2ea6;font-weight:bold;'>${milestoneText(lastMilestone(s.Shazams))}</span> — ${s.Song}</div>`).join("")
 document.body.appendChild(pop)
 
 setTimeout(()=>{if(pop.parentNode) pop.remove()},20000)
}

async function exportImage(){
 let area=document.getElementById("exportArea")
 let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
 return new Promise(resolve=>canvas.toBlob(resolve))
}

async function nativeShare(title){
 let blob=await exportImage()
 let file=new File([blob],"blackpink-"+title+".png",{type:"image/png"})
 if(navigator.canShare && navigator.canShare({files:[file]})){
   await navigator.share({files:[file],title:"BLACKPINK Shazam Tracker",text:title,url:location.href})
 } else {
   downloadPromo()
 }
}

function shareTo(platform,title){
 let url=location.href
 if(platform==="x") window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent('Check out '+title+' on BLACKPINK Shazam Tracker!')}`,"_blank")
 if(platform==="facebook") window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,"_blank")
 if(platform==="instagram"||platform==="tiktok") nativeShare(title)
}

async function downloadPromo(){
 let blob=await exportImage()
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="blackpink-tracker.png"
 a.click()
}

function shareSVG(){
 return `
 <svg class="share-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
  <circle cx="18" cy="5" r="3"/>
  <circle cx="6" cy="12" r="3"/>
  <circle cx="18" cy="19" r="3"/>
  <line x1="8.7" y1="13.4" x2="15.3" y2="17.6"/>
  <line x1="15.3" y1="6.4" x2="8.7" y2="10.6"/>
 </svg>`
}

function openPromo(title,subtitle,shazams,img,list=null){
 let contentHTML=""
 if(list){
  contentHTML+="<div style='text-align:left;margin-top:10px;'>"
  list.forEach((s,i)=>{contentHTML+=`${i+1}. ${s.Song} — ${exact(s.Shazams)}<br>`})
  contentHTML+="</div>"
 }

 let overlay=document.createElement("div")
 overlay.className="overlay"
 overlay.innerHTML=`
 <div class="card">
  <div class="close-x" onclick="this.closest('.overlay').remove()">✕</div>

  <div id="exportArea" class="exportArea">
   <img src="${img}" alt="${title}">
   <h2 style="color:#ff2ea6">${title}</h2>
   <p>${exact(shazams)} Shazams</p>
   ${contentHTML}
  </div>

  <div class="socials">
   <img src="https://cdn.simpleicons.org/x/ffffff" alt="X" onclick="shareTo('x','${title}')">
   <img src="https://cdn.simpleicons.org/facebook/ffffff" alt="Facebook" onclick="shareTo('facebook','${title}')">
   <img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" onclick="shareTo('instagram','${title}')">
   <img src="https://cdn.simpleicons.org/tiktok/ffffff" alt="TikTok" onclick="shareTo('tiktok','${title}')">
   <button class="download-btn" onclick="downloadPromo()">Download</button>
  </div>
 </div>`
 document.body.appendChild(overlay)
}

function createSong(s,rank){
 let div=document.createElement("div")
 div.className="song"
 div.innerHTML=`
 <div class="rank">${rank}</div>
 <img src="images/${s.ImageFile}" alt="${s.Song}">
 <div class="info">
  ${s.Song}
  <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
  <div class="bar"><span style="width:${progress(s.Shazams)}%"></span></div>
  <div class="hoverstats">+${exact(s.Shazams-s.Previous)} • ${progress(s.Shazams)}% to ${milestoneText(nextMilestone(s.Shazams))}</div>
 </div>
 ${shareSVG()}
 `
 div.querySelector("svg").onclick=()=>openPromo(s.Song,"",s.Shazams,"images/"+s.ImageFile)
 return div
}

function createSection(name,list){
 let div=document.createElement("div")
 div.className="section"
 let total=list.reduce((a,b)=>a+b.Shazams,0)
 let promoImage=sectionImage(name)

 div.innerHTML=`
 <div class="section-bg" style="background-image:url('${promoImage}')"></div>
 <div class="section-content">
  <h2>${name} ${shareSVG()}</h2>
 </div>`

 div.querySelector("svg").onclick=()=>openPromo(name,"",total,promoImage,list)

 let content=div.querySelector(".section-content")
 list.forEach((s,i)=>{
  if(name === "GLOBAL TOP 10") {
   content.appendChild(createSong(s,i+1))
  } else {
   let songDiv = createSong(s,i+1)
   songDiv.querySelector(".rank").remove()
   content.appendChild(songDiv)
  }
 })
 return div
}

function sectionImage(name){
 const map={
  "GLOBAL TOP 10":"images/ot4.jpg",
  "DEADLINE":"images/deadline2.png",
  "BORN PINK":"images/bornpink.jpg",
  "THE ALBUM":"images/thealbum.jpg",
  "KILL THIS LOVE - EP":"images/killthislove.jpg",
  "SQUARE UP":"images/squareup.jpg",
  "SQUARE TWO":"images/squaretwo.jpg",
  "SQUARE ONE":"images/squareone.jpg",
  "Others":"images/asifitsyourlast.jpg"
 }
 return map[name]||"images/ot4.jpg"
}

function checkMilestones(){
 let reached=[]
 songs.forEach(s=>{
  let current=lastMilestone(s.Shazams)
  let prev=previousMilestones[s.Song]||0
  if(current>prev && current>0){
   reached.push(s)
   previousMilestones[s.Song]=current
  }
 })
 if(reached.length>0) showMilestonePopup(reached)
}

function build(){
 let c=document.getElementById("content")
 c.innerHTML=""
 let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
 c.appendChild(createSection("GLOBAL TOP 10",top))
 let sections=[...new Set(songs.map(s=>s.Section))]
 sections.forEach(sec=>{
  if(sec!=="GLOBAL TOP 10")
   c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
 })
 checkMilestones()
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
 complete:function(res){
  songs=res.data.filter(s=>s.Song)
  build()
  document.getElementById("updated").innerText="Last Updated: "+songs["Last Update"]
 }})
</script>

</body>
</html>
