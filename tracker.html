<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(12px) brightness(.35);
  transform:scale(1.2);
}
.section-content{position:relative;padding:30px;}
.section h2{
  color:#ff2ea6;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 0;
  background:rgba(0,0,0,.55);
  border-radius:10px;
  transition:.25s;
  transform-origin:center center;
  position:relative;
  flex-wrap:wrap;
}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;flex-shrink:0;}
.song img{width:50px;border-radius:6px;flex-shrink:0;}
.info{flex:1;min-width:120px;}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

/* POPUP */
.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.95);
  padding:20px 25px;
  border-radius:16px;
  font-size:18px;
  z-index:9999;
  width:min(500px,95%);
  border:1px solid rgba(255,46,166,.6);
  box-shadow:0 0 20px rgba(255,46,166,.4);
}

.milestone-popup h2{
  margin:0 0 10px 0;
  color:#ff2ea6;
}

.milestone-popup ul{
  margin:0;
  padding-left:20px;
}

.milestone-popup button{
  margin-top:12px;
  background:#ff2ea6;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:48px;
  height:48px;
  pointer-events:none;
  z-index:10000;
  will-change:transform, opacity;
}

.logo-glow{
  filter:drop-shadow(0 0 6px #ff2ea6)
         drop-shadow(0 0 18px #ff2ea6);
}
</style>
</head>

<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>

/* ================= CONFETTI SYSTEM ================= */

let confettiItems=[]
let animationFrameId=null

function launchConfetti(){

  const images=[
    "images/lightstick1.png",
    "images/lightstick2.png",
    "images/bplogo.png"
  ]

  for(let i=0;i<50;i++){

    let img=document.createElement("img")
    img.className="confetti"

    let src=images[Math.floor(Math.random()*images.length)]
    img.src=src

    if(src.includes("bplogo")){
      img.classList.add("logo-glow")
    }

    img.x=Math.random()*window.innerWidth
    img.y=-60
    img.speedY=2+Math.random()*3
    img.speedX=(Math.random()-0.5)*2
    img.rotation=Math.random()*360
    img.spin=(Math.random()-0.5)*5
    img.wobble=Math.random()*100
    img.opacity=1

    document.body.appendChild(img)
    confettiItems.push(img)
  }

  if(!animationFrameId){
    animateConfetti()
  }
}

function animateConfetti(){

  confettiItems.forEach(c=>{

    c.y+=c.speedY
    c.x+=Math.sin(c.y/40 + c.wobble)*2 + c.speedX
    c.rotation+=c.spin

    if(c.y>window.innerHeight-100){
      c.opacity-=0.02
    }

    c.style.transform=
      `translate(${c.x}px,${c.y}px) rotate(${c.rotation}deg)`

    c.style.opacity=c.opacity

    if(c.opacity<=0){
      c.remove()
    }
  })

  confettiItems=confettiItems.filter(c=>document.body.contains(c))

  if(confettiItems.length>0){
    animationFrameId=requestAnimationFrame(animateConfetti)
  }else{
    cancelAnimationFrame(animationFrameId)
    animationFrameId=null
  }
}

function stopConfetti(){
  confettiItems.forEach(c=>c.remove())
  confettiItems=[]
  if(animationFrameId){
    cancelAnimationFrame(animationFrameId)
    animationFrameId=null
  }
}

/* ================= POPUP ================= */

function showMilestonePopup(songName, milestone){

  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"

  pop.innerHTML=`
    <h2>Milestone Achieved!</h2>
    <ul>
      <li>${songName} reached ${milestone.toLocaleString()} Shazams</li>
    </ul>
    <button onclick="closeMilestonePopup(this)">Close</button>
  `

  document.body.appendChild(pop)

  setTimeout(()=>{
    if(pop.parentNode){
      pop.remove()
      stopConfetti()
    }
  },20000)
}

function closeMilestonePopup(btn){
  btn.parentNode.remove()
  stopConfetti()
}

/* ================= SAMPLE TRIGGER ================= */
/* REMOVE THIS TEST LINE AFTER CONFIRMING IT WORKS */
setTimeout(()=>{
  showMilestonePopup("Test Song",1000000)
},1500)

</script>

</body>
</html>
