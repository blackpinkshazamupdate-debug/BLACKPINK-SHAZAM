<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; transform-origin:center center; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px; flex-shrink:0;}
.song img{width:50px; border-radius:6px; flex-shrink:0;}
.info{flex:1; position:relative; min-width:120px;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:15px;
  border-radius:12px;
  text-align:center;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  font-size:18px;
  overflow:hidden;
}

.exportArea img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.exportArea h2{font-size:26px; color:#ff2ea6;}
.exportArea p{font-size:18px;}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:20px 25px;
  border-radius:14px;
  z-index:9999;
  border:1px solid rgba(255,46,166,.5);
  width:min(500px,95%);
}

.milestone-popup h2{
  margin:0 0 10px;
  color:#ff2ea6;
}

.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let milestonesReached=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function lastMilestone(v){
  let last=0
  milestones.forEach(m=>{ if(v>=m) last=m })
  return last
}

function milestoneText(v){
  if(v>=1000000) return (v/1000000).toFixed(1)+"M"
  return (v/1000)+"k"
}

/* CONFETTI WITH REAL MOVEMENT */
function launchConfetti(){
  const images=[
    {src:"images/lightstick1.png"},
    {src:"images/lightstick2.png"},
    {src:"images/bplogo.png", glow:true}
  ]

  for(let i=0;i<45;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"

    let chosen=images[Math.floor(Math.random()*images.length)]
    c.style.backgroundImage=`url(${chosen.src})`

    if(chosen.glow){
      c.style.filter="drop-shadow(0 0 12px #ff2ea6)"
    }

    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.top="-80px"

    document.body.appendChild(c)
    confettiActive.push(c)
    animateConfetti(c)
  }
}

function animateConfetti(c){
  let x=parseFloat(c.style.left)
  let y=-80
  let speedY=Math.random()*3+2
  let drift=Math.random()*4-2
  let rotation=Math.random()*360
  let spin=(Math.random()*4)-2

  function frame(){
    if(!document.body.contains(c)) return
    y+=speedY
    x+=drift
    rotation+=spin

    c.style.top=y+"px"
    c.style.left=x+"px"
    c.style.transform="rotate("+rotation+"deg)"

    if(y<window.innerHeight+100){
      requestAnimationFrame(frame)
    }
  }

  requestAnimationFrame(frame)
}

function stopConfetti(){
  confettiActive.forEach(c=>c.remove())
  confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
  if(list.length===0) return

  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML="<h2>Milestone Achievements</h2>"+
  list.map(s=>`<div>${s.Song} reached ${milestoneText(lastMilestone(s.Shazams))}</div>`).join("")+
  "<button class='pink' onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

  document.body.appendChild(pop)

  setTimeout(()=>{
    if(pop.parentNode){
      pop.remove()
      stopConfetti()
    }
  },20000)
}

/* BUILD */
function build(){
  let c=document.getElementById("content")
  c.innerHTML=""

  let reachedNow=[]

  songs.forEach(s=>{
    let milestone=lastMilestone(s.Shazams)
    if(milestone>0){
      let key=s.Song+"-"+milestone
      if(!milestonesReached.includes(key)){
        milestonesReached.push(key)
        reachedNow.push(s)
      }
    }
  })

  if(reachedNow.length>0){
    setTimeout(()=>showMilestonePopup(reachedNow),800)
  }

  let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)

  let section=document.createElement("div")
  section.className="section"
  section.innerHTML="<div class='section-content'><h2>GLOBAL TOP 10</h2></div>"

  let content=section.querySelector(".section-content")
  top.forEach((s,i)=>{
    let div=document.createElement("div")
    div.className="song"
    div.innerHTML=`
      <div class="rank">${i+1}</div>
      <img src="images/${s.ImageFile}">
      <div class="info">
        ${s.Song}
        <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
      </div>`
    content.appendChild(div)
  })

  c.appendChild(section)
}

/* LOAD CSV */
Papa.parse("blackpink.csv",{
  download:true,
  header:true,
  dynamicTyping:true,
  complete:function(res){
    songs=res.data.filter(s=>s.Song)
    build()
    document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
  }
})
</script>

</body>
</html>
