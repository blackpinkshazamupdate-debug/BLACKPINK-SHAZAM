<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px;}
.song img{width:50px; border-radius:6px;}
.info{flex:1; min-width:120px;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

/* ===== PINK SHARE ICON BUTTON ===== */
.share-icon{
  width:34px;
  height:34px;
  border-radius:8px;
  background:#ff2ea6;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none;
}

.share-icon div{
  width:16px;
  height:2px;
  background:white;
  position:relative;
}

.share-icon div::before,
.share-icon div::after{
  content:"";
  position:absolute;
  width:16px;
  height:2px;
  background:white;
  left:0;
}

.share-icon div::before{ top:-6px; }
.share-icon div::after{ top:6px; }

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:20px;
  border-radius:12px;
  width:min(520px,95%);
  max-height:90vh;
  overflow-y:auto;
}

.exportArea img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:15px;
}

.exportArea h2{color:#ff2ea6;}

.social-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.social-grid button{
  background:#ff2ea6;
  border:none;
  padding:8px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* Confetti */
.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:60px;
  height:60px;
  background-size:contain;
  background-repeat:no-repeat;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]

function exact(n){ return Number(n).toLocaleString() }

/* CONFETTI */
function launchConfetti(){
  const images=[
    {src:"images/lightstick1.png"},
    {src:"images/lightstick2.png"},
    {src:"images/bplogo.png", glow:true}
  ]

  for(let i=0;i<35;i++){
    let c=document.createElement("div")
    c.className="confetti-piece"
    let chosen=images[Math.floor(Math.random()*images.length)]
    c.style.backgroundImage=`url(${chosen.src})`
    if(chosen.glow){
      c.style.filter="drop-shadow(0 0 12px #ff2ea6)"
    }

    let x=Math.random()*window.innerWidth
    let y=-60
    let speed=Math.random()*2+2
    let drift=Math.random()*2-1
    let rotate=0

    c.style.left=x+"px"
    c.style.top=y+"px"
    document.body.appendChild(c)

    function frame(){
      y+=speed
      x+=drift
      rotate+=3
      c.style.top=y+"px"
      c.style.left=x+"px"
      c.style.transform="rotate("+rotate+"deg)"
      if(y<window.innerHeight+80){
        requestAnimationFrame(frame)
      } else c.remove()
    }
    requestAnimationFrame(frame)
  }
}

/* SHARE PROMO */
function openPromo(title,shazams,img){
  let overlay=document.createElement("div")
  overlay.className="overlay"
  overlay.innerHTML=`
  <div class="card">
    <div class="exportArea" id="exportArea">
      <img src="${img}">
      <h2>${title}</h2>
      <p>${exact(shazams)} Shazams</p>
    </div>
    <div class="social-grid">
      <button onclick="shareFacebook()">Facebook</button>
      <button onclick="shareTwitter()">Twitter</button>
      <button onclick="shareInstagramPost()">Instagram Post</button>
      <button onclick="shareInstagramStory()">Instagram Story</button>
      <button onclick="shareWhatsApp()">WhatsApp</button>
      <button onclick="copyLink()">Copy Link</button>
    </div>
  </div>`
  document.body.appendChild(overlay)

  async function getImage(){
    let canvas=await html2canvas(document.getElementById("exportArea"),{backgroundColor:"#000",scale:2})
    return canvas.toDataURL()
  }

  window.shareFacebook=async()=>window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`,"_blank")
  window.shareTwitter=async()=>window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(title)}`,"_blank")
  window.shareWhatsApp=async()=>window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title+" "+location.href)}`,"_blank")
  window.copyLink=()=>navigator.clipboard.writeText(location.href)

  /* Instagram note */
  window.shareInstagramPost=async()=>{
    alert("Instagram does not allow direct web posting.\nDownload the image and upload manually.")
  }
  window.shareInstagramStory=async()=>{
    alert("Instagram Stories require mobile app upload.\nDownload the image first.")
  }
}

/* BUILD */
function createSong(s,rank){
  let div=document.createElement("div")
  div.className="song"
  div.innerHTML=`
  <div class="rank">${rank}</div>
  <img src="images/${s.ImageFile}">
  <div class="info">
    ${s.Song}
    <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
  </div>
  <button class="share-icon" onclick="openPromo('${s.Song}',${s.Shazams},'images/${s.ImageFile}')">
    <div></div>
  </button>`
  return div
}

function build(){
  let c=document.getElementById("content")
  c.innerHTML=""
  songs.forEach((s,i)=>c.appendChild(createSong(s,i+1)))
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
  songs=res.data
  build()
}})
</script>

</body>
</html>
