<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{color:#ff2ea6;font-size:28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.song{display:flex;align-items:center;gap:15px;padding:10px;margin:8px 0;background:rgba(0,0,0,.55);border-radius:10px;transition:.25s;position:relative;flex-wrap:wrap;}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;}
.song img{width:50px;border-radius:6px;}
.info{flex:1;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:0.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:.5;}

button.pink{background:#ff2ea6;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;margin-top:5px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.card{background:black;padding:15px;border-radius:12px;text-align:center;width:min(520px,95%);}

.exportArea img{
  width:100%;
  max-height:260px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:20px 25px;
  border-radius:14px;
  z-index:9999;
  border:1px solid rgba(255,46,166,.5);
}

.milestone-popup h2{margin:0 0 10px;color:#ff2ea6;}

.confetti-piece{
  position:fixed;
  width:55px;
  height:55px;
  background-size:contain;
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:10000;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let confettiActive=[]
let milestonesReached=[]

function exact(n){return Number(n).toLocaleString()}

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){milestones.push(i)}

function lastMilestone(v){
 let l=0
 milestones.forEach(m=>{if(v>=m)l=m})
 return l
}

/* CONFETTI */
function launchConfetti(){
 const imgs=[
   {src:"images/lightstick1.png"},
   {src:"images/lightstick2.png"},
   {src:"images/bplogo.png",glow:true}
 ]

 for(let i=0;i<50;i++){
   const el=document.createElement("div")
   el.className="confetti-piece"

   const chosen=imgs[Math.floor(Math.random()*imgs.length)]
   el.style.backgroundImage=`url(${chosen.src})`

   if(chosen.glow){
     el.style.filter="drop-shadow(0 0 8px #ff2ea6)"
   }

   const startX=Math.random()*window.innerWidth
   el.style.left=startX+"px"
   el.style.top="-80px"

   document.body.appendChild(el)
   confettiActive.push(el)

   animateConfetti(el,startX)
 }
}

function animateConfetti(el,x){
 let y=-80
 const speedY=Math.random()*2+2
 const drift=Math.random()*1.5-0.75
 let rotation=0
 const rotateSpeed=Math.random()*4+1

 function frame(){
   y+=speedY
   x+=drift
   rotation+=rotateSpeed

   el.style.top=y+"px"
   el.style.left=x+"px"
   el.style.transform="rotate("+rotation+"deg)"

   if(y<window.innerHeight+100){
     requestAnimationFrame(frame)
   }else{
     el.remove()
   }
 }
 requestAnimationFrame(frame)
}

function stopConfetti(){
 confettiActive.forEach(c=>c.remove())
 confettiActive=[]
}

/* POPUP */
function showMilestonePopup(list){
 if(!list.length) return

 launchConfetti()

 const pop=document.createElement("div")
 pop.className="milestone-popup"
 pop.innerHTML="<h2>Milestone Achieved!</h2>"+
 list.map(s=>`<div>${s.Song} hit ${exact(lastMilestone(s.Shazams))}</div>`).join("")+
 "<button class='pink' onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

 document.body.appendChild(pop)

 setTimeout(()=>{
   if(pop.parentNode){
     pop.remove()
     stopConfetti()
   }
 },15000)
}

/* SONG */
function createSong(s,rank){
 const div=document.createElement("div")
 div.className="song"
 div.innerHTML=`
 <div class="rank">${rank}</div>
 <img src="images/${s.ImageFile}">
 <div class="info">
 ${s.Song}
 <div class="total-shazams">${exact(s.Shazams)} Shazams</div>
 <div class="bar"><span style="width:50%"></span></div>
 </div>`
 return div
}

/* SECTION */
function createSection(name,list){
 const div=document.createElement("div")
 div.className="section"
 div.innerHTML=`
 <div class="section-content">
 <h2>${name}</h2>
 </div>`
 const content=div.querySelector(".section-content")
 list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
 return div
}

/* BUILD */
function build(){
 const c=document.getElementById("content")
 c.innerHTML=""

 const sections=[...new Set(songs.map(s=>s.Section))]

 sections.forEach(sec=>{
   const list=songs.filter(s=>s.Section===sec)
   c.appendChild(createSection(sec,list))
 })

 const newlyReached=[]
 songs.forEach(s=>{
   const milestone=lastMilestone(s.Shazams)
   if(milestone>0 && !milestonesReached.includes(s.Song+milestone)){
     milestonesReached.push(s.Song+milestone)
     newlyReached.push(s)
   }
 })

 showMilestonePopup(newlyReached)
}

/* LOAD CSV */
Papa.parse("blackpink.csv",{
 download:true,
 header:true,
 dynamicTyping:true,
 complete:function(res){
   songs=res.data.filter(r=>r.Song)
   build()
   document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
 }
})
</script>

</body>
</html>
