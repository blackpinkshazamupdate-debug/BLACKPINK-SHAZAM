<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0; background:black; color:white; font-family:"BPFont",sans-serif;}
header{text-align:center; padding:30px; font-size:38px; color:#ff2ea6;}
.updated{text-align:center; opacity:.7; margin-bottom:20px;}

.section{margin:40px 0; position:relative; overflow:hidden;}
.section-bg{position:absolute; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(12px) brightness(.35); transform:scale(1.2);}
.section-content{position:relative; padding:30px;}
.section h2{color:#ff2ea6; font-size:28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

.song{display:flex; align-items:center; gap:15px; padding:10px; margin:8px 0; background:rgba(0,0,0,.55); border-radius:10px; transition:.25s; transform-origin:center center; position:relative; flex-wrap:wrap;}
.song:hover{transform:scale(1.03); box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px; width:40px;}
.song img{width:50px; border-radius:6px;}
.info{flex:1;}

.bar{height:6px; background:#333; margin-top:6px; border-radius:5px; overflow:hidden;}
.bar span{display:block; height:100%; background:#ff2ea6;}

.total-shazams{font-size:12px; opacity:0.7; margin-top:3px;}
.hoverstats{font-size:12px; opacity:0; transition:.2s; margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:0.5;}

/* SHARE ICON */
.share-icon{
  width:22px;
  height:22px;
  cursor:pointer;
  fill:#ff2ea6;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:15px;
  border-radius:12px;
  text-align:center;
  width:min(520px,95%);
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:15px;
  background:black;
  border-radius:12px;
  font-size:18px;
}

.exportArea img{
  width:100%;
  height:auto;
  border-radius:10px;
  margin-bottom:10px;
}

.exportArea h2{font-size:26px; color:#ff2ea6;}
.exportArea p{font-size:18px;}

.social-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-top:12px;
}

.social-buttons button{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]

function exact(n){ return Number(n).toLocaleString() }

/* SHARE ICON SVG */
function shareSVG(){
return `
<svg class="share-icon" viewBox="0 0 24 24">
<circle cx="18" cy="5" r="3"/>
<circle cx="6" cy="12" r="3"/>
<circle cx="18" cy="19" r="3"/>
<line x1="8.6" y1="13.5" x2="15.4" y2="17.5" stroke="#ff2ea6" stroke-width="2"/>
<line x1="15.4" y1="6.5" x2="8.6" y2="10.5" stroke="#ff2ea6" stroke-width="2"/>
</svg>`
}

/* PROMO OVERLAY */
function openPromo(title,shazams,img){
let overlay=document.createElement("div")
overlay.className="overlay"
overlay.innerHTML=`
<div class="card">
  <div id="exportArea" class="exportArea">
    <img src="${img}">
    <h2>${title}</h2>
    <p>${exact(shazams)} Shazams</p>
  </div>
  <div class="social-buttons">
    <button onclick="shareFacebook()">Facebook</button>
    <button onclick="shareTwitter()">Twitter</button>
    <button onclick="shareInstagramPost()">Instagram Post</button>
    <button onclick="shareInstagramStory()">Instagram Story</button>
    <button onclick="shareWhatsApp()">WhatsApp</button>
    <button onclick="copyLink()">Copy Link</button>
    <button onclick="this.closest('.overlay').remove()">Close</button>
  </div>
</div>`
document.body.appendChild(overlay)
}

function shareFacebook(){
window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(location.href),"_blank")
}
function shareTwitter(){
window.open("https://twitter.com/intent/tweet?url="+encodeURIComponent(location.href),"_blank")
}
function shareWhatsApp(){
window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(location.href),"_blank")
}
function shareInstagramPost(){
alert("Download the promo image and upload it as Instagram Post.")
}
function shareInstagramStory(){
alert("Download the promo image and upload it as Instagram Story.")
}
function copyLink(){
navigator.clipboard.writeText(location.href)
alert("Link copied!")
}

/* SONG */
function createSong(s,rank){
let div=document.createElement("div")
div.className="song"
div.innerHTML=`
<div class="rank">${rank}</div>
<img src="images/${s.ImageFile}">
<div class="info">
${s.Song}
<div class="total-shazams">${exact(s.Shazams)} Shazams</div>
</div>
<div onclick="openPromo('${s.Song}',${s.Shazams},'images/${s.ImageFile}')">
${shareSVG()}
</div>`
return div
}

/* BUILD */
function build(){
let c=document.getElementById("content")
c.innerHTML=""
let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
top.forEach((s,i)=>c.appendChild(createSong(s,i+1)))
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
songs=res.data
build()
}})
</script>

</body>
</html>
