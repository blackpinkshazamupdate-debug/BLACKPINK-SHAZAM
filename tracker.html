<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(12px) brightness(.35);
  transform:scale(1.2);
}
.section-content{position:relative;padding:30px;}
.section h2{
  color:#ff2ea6;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.song{
  display:flex;
  align-items:center;
  gap:15px;
  padding:10px;
  margin:8px 0;
  background:rgba(0,0,0,.55);
  border-radius:10px;
  transition:.25s;
  transform-origin:center center;
  position:relative;
  flex-wrap:wrap;
}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;flex-shrink:0;}
.song img{width:50px;border-radius:6px;flex-shrink:0;}
.info{flex:1;position:relative;min-width:120px;}

.total-shazams{font-size:12px;opacity:0.7;margin-top:3px;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.card{
  background:black;
  padding:20px;
  border-radius:16px;
  text-align:center;
  width:min(520px,95%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

.exportArea{
  padding:20px;
  background:black;
  border-radius:16px;
  font-size:18px;
  text-align:center;
}

.exportArea img{
  width:auto;
  max-width:100%;
  height:auto;
  max-height:260px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
}

button.pink{
  background:#ff2ea6;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.milestone-popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:20px 25px;
  border-radius:14px;
  font-size:18px;
  z-index:9999;
  width:min(500px,95%);
  border:1px solid rgba(255,46,166,.5);
}

/* CONFETTI */
.confetti-piece{
  position:fixed;
  pointer-events:none;
  z-index:10000;
  width:50px;
  height:50px;
  will-change:transform;
}

.logo-glow{
  filter: drop-shadow(0 0 8px #ff2ea6)
          drop-shadow(0 0 18px #ff2ea6);
}
</style>
</head>

<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>

let songs=[]
let confettiActive=[]
let milestoneMemory={}

function exact(n){ return Number(n).toLocaleString() }

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){ milestones.push(i) }

function lastMilestone(v){ return milestones.filter(m=>v>=m).pop() }

/* CONFETTI SYSTEM */
function launchConfetti(){

  const images=[
    "images/lightstick1.png",
    "images/lightstick2.png",
    "images/bplogo.png"
  ]

  for(let i=0;i<45;i++){

    let img=document.createElement("img")
    img.className="confetti-piece"

    let chosen=images[Math.floor(Math.random()*images.length)]
    img.src=chosen

    if(chosen.includes("bplogo")){
      img.classList.add("logo-glow")
    }

    img.x=Math.random()*window.innerWidth
    img.y=-80
    img.rotation=Math.random()*360
    img.speedY=2+Math.random()*2
    img.speedX=(Math.random()-.5)*3
    img.spin=(Math.random()-.5)*6
    img.wobble=Math.random()*100

    img.style.left="0px"
    img.style.top="0px"

    document.body.appendChild(img)
    confettiActive.push(img)
  }

  requestAnimationFrame(animateConfetti)
}

function animateConfetti(){

  confettiActive.forEach(c=>{

    c.y+=c.speedY
    c.x+=Math.sin(c.y/30 + c.wobble)*2 + c.speedX
    c.rotation+=c.spin

    c.style.transform=
      `translate(${c.x}px,${c.y}px) rotate(${c.rotation}deg)`

    if(c.y>window.innerHeight+100){
      c.remove()
    }
  })

  confettiActive=confettiActive.filter(c=>document.body.contains(c))

  if(confettiActive.length>0){
    requestAnimationFrame(animateConfetti)
  }
}

function stopConfetti(){
  confettiActive.forEach(c=>c.remove())
  confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
  if(list.length===0) return

  launchConfetti()

  let pop=document.createElement("div")
  pop.className="milestone-popup"
  pop.innerHTML="<h2>Milestone Achievements</h2><ul>"+
  list.map(s=>`<li>${s.Song} reached ${exact(lastMilestone(s.Shazams))}</li>`).join("")
  +"</ul><button onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

  document.body.appendChild(pop)

  setTimeout(()=>{
    if(pop.parentNode){
      pop.remove()
      stopConfetti()
    }
  },20000)
}

/* REST OF YOUR ORIGINAL BUILD LOGIC UNCHANGED */

document.addEventListener("DOMContentLoaded",function(){
  Papa.parse("blackpink.csv",{
    download:true,
    header:true,
    dynamicTyping:true,
    complete:function(res){
      songs=res.data.filter(s=>s.Song)
      document.getElementById("updated").innerText=
        "Last Updated: "+(songs[0]?.["Last Update"]||"")
    }
  })
})

</script>
</body>
</html>
