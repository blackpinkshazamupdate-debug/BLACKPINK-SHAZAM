<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKPINK Shazam Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@font-face{
  font-family:"BPFont";
  src:url("fonts/ZEN-SERIF-TTF-Regular.ttf") format("truetype");
}

body{margin:0;background:black;color:white;font-family:"BPFont",sans-serif;}
header{text-align:center;padding:30px;font-size:38px;color:#ff2ea6;}
.updated{text-align:center;opacity:.7;margin-bottom:20px;}

.section{margin:40px 0;position:relative;overflow:hidden;}
.section-bg{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(12px) brightness(.35);transform:scale(1.2);}
.section-content{position:relative;padding:30px;}
.section h2{color:#ff2ea6;font-size:28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.song{display:flex;align-items:center;gap:15px;padding:10px;margin:8px 0;background:rgba(0,0,0,.55);border-radius:10px;transition:.25s;position:relative;flex-wrap:wrap;}
.song:hover{transform:scale(1.03);box-shadow:0 0 15px #ff2ea6;}

.rank{font-size:20px;width:40px;}
.song img{width:50px;border-radius:6px;}
.info{flex:1;min-width:120px;}

.bar{height:6px;background:#333;margin-top:6px;border-radius:5px;overflow:hidden;}
.bar span{display:block;height:100%;background:#ff2ea6;}

.total-shazams{font-size:12px;opacity:0.7;margin-top:3px;}
.hoverstats{font-size:12px;opacity:0;transition:.2s;margin-top:5px;}
.song:hover .hoverstats{opacity:1;}
.song:hover .total-shazams{opacity:.5;}

button.pink{
background:#ff2ea6;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

/* SHARE OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
padding:20px;
}

.card{
background:black;
padding:15px;
border-radius:12px;
text-align:center;
width:min(520px,95%);
max-height:90vh;
display:flex;
flex-direction:column;
}

.exportArea{
padding:20px;
background:black;
border-radius:12px;
font-size:20px;
}

.exportArea img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.exportArea h2{color:#ff2ea6;font-size:28px;}
.exportArea p{font-size:22px;}

/* MILESTONE */
.milestone-popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.9);
padding:20px 25px;
border-radius:14px;
z-index:9999;
border:1px solid rgba(255,46,166,.5);
}

.milestone-popup h2{margin:0 0 10px;color:#ff2ea6;}

.confetti-piece{
position:fixed;
width:60px;
height:60px;
background-size:contain;
background-repeat:no-repeat;
pointer-events:none;
z-index:10000;
}
</style>
</head>
<body>

<header>BLACKPINK Shazam Tracker</header>
<div class="updated" id="updated"></div>
<div id="content"></div>

<script>
let songs=[]
let milestonesReached=[]
let confettiActive=[]

function exact(n){return Number(n).toLocaleString()}

const milestones=[]
for(let i=100000;i<=5000000;i+=100000){milestones.push(i)}

function lastMilestone(v){let l=0;milestones.forEach(m=>{if(v>=m)l=m});return l}

/* CONFETTI WITH DRIFT + ROTATION */
function launchConfetti(){
const imgs=[
{src:"images/lightstick1.png"},
{src:"images/lightstick2.png"},
{src:"images/bplogo.png",glow:true}
]

for(let i=0;i<45;i++){
let el=document.createElement("div")
el.className="confetti-piece"

let chosen=imgs[Math.floor(Math.random()*imgs.length)]
el.style.backgroundImage=`url(${chosen.src})`

if(chosen.glow){
el.style.filter="drop-shadow(0 0 12px #ff2ea6)"
}

el.style.left=Math.random()*window.innerWidth+"px"
el.style.top="-80px"

document.body.appendChild(el)
confettiActive.push(el)
animateConfetti(el)
}
}

function animateConfetti(el){
let x=parseFloat(el.style.left)
let y=-80
let speedY=Math.random()*3+2
let drift=Math.random()*2-1
let rotate=0

function frame(){
y+=speedY
x+=drift
rotate+=2
el.style.top=y+"px"
el.style.left=x+"px"
el.style.transform="rotate("+rotate+"deg)"
if(y<window.innerHeight+100){
requestAnimationFrame(frame)
}
}
requestAnimationFrame(frame)
}

function stopConfetti(){
confettiActive.forEach(c=>c.remove())
confettiActive=[]
}

/* MILESTONE POPUP */
function showMilestonePopup(list){
if(!list.length) return
launchConfetti()

let pop=document.createElement("div")
pop.className="milestone-popup"
pop.innerHTML="<h2>Milestone Achieved!</h2>"+
list.map(s=>`<div>${s.Song} hit ${exact(lastMilestone(s.Shazams))}</div>`).join("")+
"<button class='pink' onclick='this.parentNode.remove();stopConfetti()'>Close</button>"

document.body.appendChild(pop)
setTimeout(()=>{if(pop.parentNode){pop.remove();stopConfetti()}},15000)
}

/* SHARE SYSTEM */
async function generateShare(title,total,img,listHTML=""){
let overlay=document.createElement("div")
overlay.className="overlay"
overlay.innerHTML=`
<div class="card">
<div id="exportArea" class="exportArea">
<img src="${img}">
<h2>${title}</h2>
<p>${exact(total)} Shazams</p>
${listHTML}
</div>
<div>
<button class="pink" onclick="shareImage()">Share</button>
<button class="pink" onclick="downloadImage()">Download</button>
<button class="pink" onclick="this.closest('.overlay').remove()">Close</button>
</div>
</div>`
document.body.appendChild(overlay)
}

async function shareImage(){
let area=document.getElementById("exportArea")
let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
canvas.toBlob(async blob=>{
let file=new File([blob],"blackpink.png",{type:"image/png"})
if(navigator.share){
await navigator.share({
files:[file],
title:"BLACKPINK Shazam Tracker",
text:"Streaming BLACKPINK 🔥",
url:location.href
})
}
})
}

async function downloadImage(){
let area=document.getElementById("exportArea")
let canvas=await html2canvas(area,{backgroundColor:"#000",scale:2})
let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="blackpink-promo.png"
a.click()
}

/* SONG */
function createSong(s,rank){
let div=document.createElement("div")
div.className="song"
div.innerHTML=`
<div class="rank">${rank}</div>
<img src="images/${s.ImageFile}">
<div class="info">
${s.Song}
<div class="total-shazams">${exact(s.Shazams)} Shazams</div>
</div>
<button class="pink" onclick="generateShare('${s.Song}',${s.Shazams},'images/${s.ImageFile}')">Share</button>`
return div
}

/* SECTION */
function createSection(name,list){
let div=document.createElement("div")
div.className="section"
let total=list.reduce((a,b)=>a+b.Shazams,0)
div.innerHTML=`
<div class="section-content">
<h2>${name}
<button class="pink" onclick="generateShare('${name}',${total},'images/ot4.jpg')">Share</button>
</h2>
</div>`
let content=div.querySelector(".section-content")
list.forEach((s,i)=>content.appendChild(createSong(s,i+1)))
return div
}

function build(){
let c=document.getElementById("content")
c.innerHTML=""
let top=[...songs].sort((a,b)=>b.Shazams-a.Shazams).slice(0,10)
c.appendChild(createSection("GLOBAL TOP 10",top))

let sections=[...new Set(songs.map(s=>s.Section))]
sections.forEach(sec=>{
if(sec!=="GLOBAL TOP 10"){
c.appendChild(createSection(sec,songs.filter(x=>x.Section===sec)))
}
})

showMilestonePopup(top.filter(s=>s.Shazams>=100000))
}

Papa.parse("blackpink.csv",{download:true,header:true,dynamicTyping:true,
complete:function(res){
songs=res.data
build()
document.getElementById("updated").innerText="Last Updated: "+songs[0]["Last Update"]
}})
</script>

</body>
</html>
